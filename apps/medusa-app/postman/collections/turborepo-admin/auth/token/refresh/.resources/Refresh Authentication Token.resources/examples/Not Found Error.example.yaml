$kind: http-example
request:
  url: "{{baseUrl}}/auth/token/refresh"
  method: POST
  headers:
    Accept: application/json
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
