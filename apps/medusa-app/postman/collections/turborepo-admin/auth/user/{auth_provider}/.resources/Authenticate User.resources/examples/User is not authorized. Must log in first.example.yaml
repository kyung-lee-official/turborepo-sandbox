$kind: http-example
request:
  url: "{{baseUrl}}/auth/user/:auth_provider"
  method: POST
  headers:
    Content-Type: application/json
    Accept: text/plain
  pathVariables:
    - key: auth_provider
      value: emailpass
      description: The provider used for authentication.
  body:
    type: json
    content: "{}"
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
