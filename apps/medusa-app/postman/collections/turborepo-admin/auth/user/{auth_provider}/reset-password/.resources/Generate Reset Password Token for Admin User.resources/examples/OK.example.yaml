$kind: http-example
request:
  url: "{{baseUrl}}/auth/user/:auth_provider/reset-password"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    - key: auth_provider
      value: emailpass
      description: The provider used for authentication.
  body:
    type: json
    content: |-
      {
        "identifier": "admin@medusa-test.com",
        "metadata": {}
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: text
    content: ""
order: 1000
