$kind: http-example
request:
  url: "{{baseUrl}}/auth/user/:auth_provider/callback"
  method: POST
  headers:
    Accept: application/json
  pathVariables:
    - key: auth_provider
      value: google
      description: The provider used for authentication.
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
