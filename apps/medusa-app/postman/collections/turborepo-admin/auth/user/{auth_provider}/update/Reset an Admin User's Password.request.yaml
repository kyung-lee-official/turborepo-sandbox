$kind: http-request
description: Reset an admin user's password using a reset-password token
  generated with the [Generate Reset Password Token API
  route](https://docs.medusajs.com/api/admin#auth_postactor_typeauth_providerresetpassword).
  You pass the token as a bearer token in the request's Authorization header.
url: "{{baseUrl}}/auth/user/:auth_provider/update"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: auth_provider
    value: emailpass
    description: The provider used for authentication.
body:
  type: json
  content: |-
    {
      "email": "admin@medusa-test.com",
      "password": "supersecret"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Reset an Admin User's Password.resources/examples
order: 1000
