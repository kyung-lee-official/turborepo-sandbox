$kind: http-example
request:
  url: "{{baseUrl}}/auth/user/:auth_provider"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: auth_provider
      value: emailpass
      description: The provider used for authentication.
  body:
    type: json
    content: "{}"
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
