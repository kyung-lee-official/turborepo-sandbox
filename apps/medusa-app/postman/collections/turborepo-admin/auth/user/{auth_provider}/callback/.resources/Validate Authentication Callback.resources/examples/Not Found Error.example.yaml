$kind: http-example
request:
  url: "{{baseUrl}}/auth/user/:auth_provider/callback"
  method: POST
  headers:
    Accept: application/json
  pathVariables:
    - key: auth_provider
      value: google
      description: The provider used for authentication.
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
