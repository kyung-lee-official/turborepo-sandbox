$kind: http-example
request:
  url: "{{baseUrl}}/admin/translations?q=string&reference_id=prod_123&reference=s\
    tring&locale_code=fr-FR&limit=3050.1607324519186&offset=3157.9117089204024&\
    order=string&with_deleted=false&fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: q
      value: string
      description: Search query to filter translations by their fields.
    - key: reference_id
      value: prod_123
    - key: reference
      value: string
      description: Filter translations by the resource they belong to. For example,
        `product` or `product_variant`.
    - key: locale_code
      value: fr-FR
    - key: limit
      value: "3050.1607324519186"
      description: Limit the number of items returned in the list.
    - key: offset
      value: "3157.9117089204024"
      description: The number of items to skip when retrieving a list.
    - key: order
      value: string
      description: The field to sort the data by. By default, the sort order is
        ascending. To change the order to descending, prefix the field name with
        `-`.
    - key: with_deleted
      value: "false"
      description: The translation's with deleted.
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. If a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. Without prefix
        it will replace the entire default fields.
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
