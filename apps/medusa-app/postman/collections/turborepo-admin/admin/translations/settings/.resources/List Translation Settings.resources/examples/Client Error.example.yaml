$kind: http-example
request:
  url: "{{baseUrl}}/admin/translations/settings?entity_type=product&is_active=false"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: entity_type
      value: product
      description: The entity to retrieve translation settings for.
    - key: is_active
      value: "false"
      description: Filter resources by whether translations is activated for them or
        not. If not provided, all resources are returned.
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
