$kind: http-request
description: Retrieve the list of translatable fields for all entities, such as
  products and collections. You can also filter the results by entity type or
  active entities.
url: "{{baseUrl}}/admin/translations/settings?entity_type=product&is_active=false"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: entity_type
    value: product
    description: The entity to retrieve translation settings for.
  - key: is_active
    value: "false"
    description: Filter resources by whether translations is activated for them or
      not. If not provided, all resources are returned.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/List Translation Settings.resources/examples
order: 2000
