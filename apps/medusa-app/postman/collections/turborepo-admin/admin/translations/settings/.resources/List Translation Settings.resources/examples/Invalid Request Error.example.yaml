$kind: http-example
request:
  url: "{{baseUrl}}/admin/translations/settings?entity_type=product&is_active=false"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: entity_type
      value: product
      description: The entity to retrieve translation settings for.
    - key: is_active
      value: "false"
      description: Filter resources by whether translations is activated for them or
        not. If not provided, all resources are returned.
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
