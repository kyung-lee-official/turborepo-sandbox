$kind: http-example
request:
  url: "{{baseUrl}}/admin/translations/settings?entity_type=product&is_active=false"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: entity_type
      value: product
      description: The entity to retrieve translation settings for.
    - key: is_active
      value: "false"
      description: Filter resources by whether translations is activated for them or
        not. If not provided, all resources are returned.
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "code": "unknown_error",
        "message": "The request conflicted with another request. You may retry the request with the provided Idempotency-Key.",
        "type": "QueryRunnerAlreadyReleasedError"
      }
order: 5000
