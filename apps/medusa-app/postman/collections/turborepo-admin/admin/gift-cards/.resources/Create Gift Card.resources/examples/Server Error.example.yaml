$kind: http-example
request:
  url: "{{baseUrl}}/admin/gift-cards?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: >-
        Comma-separated fields that should be included in the returned data.

        if a field is prefixed with `+` it will be added to the default fields,
        using `-` will remove it from the default fields.

        without prefix it will replace the entire default fields.
  body:
    type: json
    content: |-
      {
        "code": "string",
        "value": 20,
        "currency_code": "usd",
        "expires_at": "string",
        "reference_id": "string",
        "reference": "string",
        "line_item_id": "string",
        "customer_id": "string",
        "metadata": {}
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
