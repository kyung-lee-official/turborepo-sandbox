$kind: http-request
description: Update a gift card's details.
url: "{{baseUrl}}/admin/gift-cards/:id?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The gift card's ID.
body:
  type: json
  content: |-
    {
      "status": "pending",
      "value": 4889.57141461255,
      "customer_id": "string",
      "currency_code": "usd",
      "note": "string",
      "expires_at": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update a Gift Card.resources/examples
order: 4000
