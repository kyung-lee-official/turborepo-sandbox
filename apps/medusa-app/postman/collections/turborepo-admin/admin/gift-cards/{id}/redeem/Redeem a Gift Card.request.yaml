$kind: http-request
description: Redeem a gift card and add it to the customer's store credit account.
url: "{{baseUrl}}/admin/gift-cards/:id/redeem?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The gift card's ID.
body:
  type: json
  content: |-
    {
      "customer_id": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Redeem a Gift Card.resources/examples
order: 1000
