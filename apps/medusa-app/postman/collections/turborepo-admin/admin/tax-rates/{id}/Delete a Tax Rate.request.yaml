$kind: http-request
description: Delete a tax rate.
url: "{{baseUrl}}/admin/tax-rates/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The tax rate's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Tax Rate.resources/examples
order: 4000
