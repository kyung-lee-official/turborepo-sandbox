$kind: http-example
request:
  url: "{{baseUrl}}/admin/fulfillment-sets/:id/service-zones/:zone_id?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The fulfillment set's ID.
    - key: zone_id
      value: string
      description: The service zone's ID.
  body:
    type: json
    content: |-
      {
        "name": "string",
        "geo_zones": [
          {
            "type": "zip",
            "metadata": {},
            "city": "string",
            "country_code": "string",
            "province_code": "us-ca",
            "postal_expression": {},
            "id": "string"
          },
          {
            "type": "country",
            "metadata": {},
            "country_code": "string",
            "id": "string"
          }
        ]
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
