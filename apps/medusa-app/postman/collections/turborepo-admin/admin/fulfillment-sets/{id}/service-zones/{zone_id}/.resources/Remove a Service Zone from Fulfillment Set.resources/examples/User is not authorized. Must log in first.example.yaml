$kind: http-example
request:
  url: "{{baseUrl}}/admin/fulfillment-sets/:id/service-zones/:zone_id"
  method: DELETE
  headers:
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The fulfillment set's ID.
    - key: zone_id
      value: string
      description: The service zone's ID.
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
