$kind: http-request
description: Delete a fulfillment set.
url: "{{baseUrl}}/admin/fulfillment-sets/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The fulfillment set's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete Fulfillment Set.resources/examples
order: 2000
