$kind: http-request
description: >
  Update a new shipping method that was added to a draft order edit using the
  `ID` of the method's `SHIPPING_ADD` action.


  Every shipping method has an `actions` property, whose value is an array of
  actions. You can check the action's name using its `action` property, and use
  the value of the `id` property.
url: "{{baseUrl}}/admin/draft-orders/:id/edit/shipping-methods/:action_id"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
  - key: action_id
    value: string
    description: The ID of the shipping method's `SHIPPING_ADD` action.
body:
  type: json
  content: |-
    {
      "shipping_option_id": "string",
      "custom_amount": 605.5440899232311,
      "description": "string",
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update New Shipping Method in Draft Order Edit.resources/examples
order: 1000
