$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/items/:action_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
    - key: action_id
      value: string
      description: The ID of the item's `ITEM_ADD` action.
  body:
    type: json
    content: |-
      {
        "quantity": 2069.6376909933088,
        "unit_price": 4921.909937036872,
        "compare_at_unit_price": 850.5142567043333,
        "internal_note": "string"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
