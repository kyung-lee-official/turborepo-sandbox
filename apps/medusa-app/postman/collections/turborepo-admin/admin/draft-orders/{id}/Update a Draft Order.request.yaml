$kind: http-request
description: Update a draft order's details. This doesn't include updating the
  draft order's items, shipping methods, or promotions. To update those, you
  need to create an edit that you can later request or confirm.
url: "{{baseUrl}}/admin/draft-orders/:id?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
body:
