$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/items/:action_id"
  method: DELETE
  headers:
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
    - key: action_id
      value: string
      description: The ID of the order item's `ITEM_ADD` or `ITEM_UPDATE` action.
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
