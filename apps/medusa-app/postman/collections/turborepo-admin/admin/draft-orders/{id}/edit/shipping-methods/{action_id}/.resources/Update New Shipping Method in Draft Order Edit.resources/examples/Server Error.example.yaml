$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/shipping-methods/:action_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
    - key: action_id
      value: string
      description: The ID of the shipping method's `SHIPPING_ADD` action.
  body:
    type: json
    content: |-
      {
        "shipping_option_id": "string",
        "custom_amount": 605.5440899232311,
        "description": "string",
        "internal_note": "string",
        "metadata": {}
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
