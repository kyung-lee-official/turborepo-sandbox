$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/shipping-methods/method/:method_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
    - key: method_id
      value: string
      description: The ID of the shipping method.
  body:
    type: json
    content: |-
      {
        "shipping_option_id": "string",
        "custom_amount": 9524.656190350752,
        "internal_note": "string"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
