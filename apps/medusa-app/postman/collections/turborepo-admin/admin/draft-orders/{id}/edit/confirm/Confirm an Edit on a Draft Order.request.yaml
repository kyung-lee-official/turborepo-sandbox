$kind: http-request
description: Confirm an edit on a draft order. This will apply the changes made
  to the draft order.
url: "{{baseUrl}}/admin/draft-orders/:id/edit/confirm"
method: POST
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Confirm an Edit on a Draft Order.resources/examples
order: 1000
