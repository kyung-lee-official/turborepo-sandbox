$kind: http-request
description: Add an item to a draft order edit.
url: "{{baseUrl}}/admin/draft-orders/:id/edit/items"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
body:
  type: json
  content: |-
    {
      "items": [
        {
          "quantity": 4257.765204632151,
          "variant_id": "string",
          "title": "string",
          "unit_price": 4152.512015927092,
          "compare_at_unit_price": 2547.674981728947,
          "internal_note": "string",
          "allow_backorder": false,
          "metadata": {}
        },
        {
          "quantity": 5738.2290494260005,
          "variant_id": "string",
          "title": "string",
          "unit_price": 1904.2860677429396,
          "compare_at_unit_price": 9380.301344202397,
          "internal_note": "string",
          "allow_backorder": true,
          "metadata": {}
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Item to Draft Order Edit.resources/examples
order: 3000
