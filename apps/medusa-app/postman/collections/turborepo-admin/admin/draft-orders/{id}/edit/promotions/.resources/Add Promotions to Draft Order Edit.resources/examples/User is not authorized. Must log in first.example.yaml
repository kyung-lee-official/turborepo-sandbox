$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/promotions"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
  body:
    type: json
    content: |-
      {
        "promo_codes": [
          "string",
          "string"
        ]
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
