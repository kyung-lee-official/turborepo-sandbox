$kind: http-request
description: >
  Remove an order item from a draft order edit by the ID of the item's
  `ITEM_ADD` or `ITEM_UPDATE` action.


  Every item has an `actions` property, whose value is an array of actions. You
  can check the action's name using its `action` property, and use the value of
  the `id` property.
url: "{{baseUrl}}/admin/draft-orders/:id/edit/items/:action_id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
  - key: action_id
    value: string
    description: The ID of the order item's `ITEM_ADD` or `ITEM_UPDATE` action.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Remove Item from Draft Order Edit.resources/examples
order: 2000
