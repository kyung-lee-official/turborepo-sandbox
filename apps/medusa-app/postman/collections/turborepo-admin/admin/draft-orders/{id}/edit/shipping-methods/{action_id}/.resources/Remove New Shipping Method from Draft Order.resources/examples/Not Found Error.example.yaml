$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/shipping-methods/:action_id"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
    - key: action_id
      value: string
      description: The ID of the shipping method's `SHIPPING_ADD` action.
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
