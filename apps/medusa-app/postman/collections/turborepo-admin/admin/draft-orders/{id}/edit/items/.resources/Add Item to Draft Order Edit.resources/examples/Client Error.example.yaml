$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/items"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
  body:
    type: json
    content: |-
      {
        "items": [
          {
            "quantity": 4257.765204632151,
            "variant_id": "string",
            "title": "string",
            "unit_price": 4152.512015927092,
            "compare_at_unit_price": 2547.674981728947,
            "internal_note": "string",
            "allow_backorder": false,
            "metadata": {}
          },
          {
            "quantity": 5738.2290494260005,
            "variant_id": "string",
            "title": "string",
            "unit_price": 1904.2860677429396,
            "compare_at_unit_price": 9380.301344202397,
            "internal_note": "string",
            "allow_backorder": true,
            "metadata": {}
          }
        ]
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
