$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/shipping-methods/method/:method_id"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
    - key: method_id
      value: string
      description: The shipping method's ID.
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
