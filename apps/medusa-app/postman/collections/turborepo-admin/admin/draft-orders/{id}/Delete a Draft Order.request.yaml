$kind: http-request
description: Delete a draft order.
url: "{{baseUrl}}/admin/draft-orders/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Draft Order.resources/examples
order: 5000
