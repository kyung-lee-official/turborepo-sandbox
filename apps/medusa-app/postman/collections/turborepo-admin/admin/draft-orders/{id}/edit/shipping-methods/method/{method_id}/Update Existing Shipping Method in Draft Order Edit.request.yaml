$kind: http-request
description: Update an existing shipping method in a draft order edit.
url: "{{baseUrl}}/admin/draft-orders/:id/edit/shipping-methods/method/:method_id"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
  - key: method_id
    value: string
    description: The ID of the shipping method.
body:
  type: json
  content: |-
    {
      "shipping_option_id": "string",
      "custom_amount": 9524.656190350752,
      "internal_note": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update Existing Shipping Method in Draft Order
  Edit.resources/examples
order: 1000
