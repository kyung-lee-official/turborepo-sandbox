$kind: http-request
description: Remove specified promotions from a draft order edit.
url: "{{baseUrl}}/admin/draft-orders/:id/edit/promotions"
method: DELETE
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
body:
  type: json
  content: |-
    {
      "promo_codes": [
        "string",
        "string"
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Remove Promotions from Draft Order Edit.resources/examples
order: 2000
