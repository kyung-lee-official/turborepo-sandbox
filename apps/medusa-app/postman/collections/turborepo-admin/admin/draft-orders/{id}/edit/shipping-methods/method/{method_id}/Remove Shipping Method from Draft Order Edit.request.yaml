$kind: http-request
description: Remove an existing shipping method from a draft order edit.
url: "{{baseUrl}}/admin/draft-orders/:id/edit/shipping-methods/method/:method_id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
  - key: method_id
    value: string
    description: The shipping method's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Remove Shipping Method from Draft Order Edit.resources/examples
order: 2000
