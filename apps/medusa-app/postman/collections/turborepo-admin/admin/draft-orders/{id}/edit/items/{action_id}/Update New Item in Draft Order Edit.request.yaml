$kind: http-request
description: >
  Update a new item that was added to a draft order edit by the ID of the item's
  `ITEM_ADD` action.


  Every item has an `actions` property, whose value is an array of actions. You
  can check the action's name using its `action` property, and use the value of
  the `id` property.
url: "{{baseUrl}}/admin/draft-orders/:id/edit/items/:action_id"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The draft order's ID.
  - key: action_id
    value: string
    description: The ID of the item's `ITEM_ADD` action.
body:
  type: json
  content: |-
    {
      "quantity": 2069.6376909933088,
      "unit_price": 4921.909937036872,
      "compare_at_unit_price": 850.5142567043333,
      "internal_note": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update New Item in Draft Order Edit.resources/examples
order: 1000
