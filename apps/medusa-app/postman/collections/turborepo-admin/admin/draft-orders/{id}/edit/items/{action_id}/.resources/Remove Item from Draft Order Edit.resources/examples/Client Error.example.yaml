$kind: http-example
request:
  url: "{{baseUrl}}/admin/draft-orders/:id/edit/items/:action_id"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The draft order's ID.
    - key: action_id
      value: string
      description: The ID of the order item's `ITEM_ADD` or `ITEM_UPDATE` action.
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
