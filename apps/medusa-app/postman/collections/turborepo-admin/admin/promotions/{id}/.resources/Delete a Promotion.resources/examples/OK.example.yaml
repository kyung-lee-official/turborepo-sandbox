$kind: http-example
request:
  url: "{{baseUrl}}/admin/promotions/:id"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The promotion's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "string",
        "object": "promotion",
        "deleted": false
      }
order: 1000
