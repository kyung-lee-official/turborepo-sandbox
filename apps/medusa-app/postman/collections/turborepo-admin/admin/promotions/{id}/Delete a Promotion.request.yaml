$kind: http-request
description: Delete a promotion.
url: "{{baseUrl}}/admin/promotions/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The promotion's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Promotion.resources/examples
order: 7000
