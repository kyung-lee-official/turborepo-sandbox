      value: buyget
      description: The promotion's type.
    - key: application_method_type
      value: percentage
      description: The promotion's application method type.
    - key: application_method_target_type
      value: items
      description: The promotion's application method target type.
  pathVariables:
    - key: id
      value: string
      description: The promotion's ID.
  body:
    type: json
    content: |-
      {
        "create": [
          {
            "operator": "ne",
            "attribute": "items.product.id",
            "values": "prod_123",
            "description": "string"
          },
          {
            "operator": "lte",
            "attribute": "items.product.id",
            "values": "prod_123",
            "description": "string"
          }
        ],
        "update": [
          {
            "id": "string",
            "values": "prod_123",
            "operator": "gte",
            "description": "string",
            "attribute": "items.product.id"
          },
          {
            "id": "string",
            "values": "prod_123",
            "operator": "lt",
            "description": "string",
            "attribute": "items.product.id"
          }
        ],
        "delete": [
          "string",
          "string"
        ]
      }
