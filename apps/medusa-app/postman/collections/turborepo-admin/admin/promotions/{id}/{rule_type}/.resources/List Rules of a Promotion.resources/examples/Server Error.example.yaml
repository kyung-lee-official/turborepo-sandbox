$kind: http-example
request:
  url: "{{baseUrl}}/admin/promotions/:id/:rule_type?fields=string&promotion_type=\
    buyget&application_method_type=percentage&application_method_target_type=it\
    ems"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: promotion_type
      value: buyget
      description: The type
    - key: application_method_type
      value: percentage
      description: The promotion's application method type.
    - key: application_method_target_type
      value: items
      description: The promotion's application method target type.
  pathVariables:
    - key: id
      value: string
      description: The promotion's ID.
    - key: rule_type
      value: buy-rules
      description: The type of rules to retrieve.
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
