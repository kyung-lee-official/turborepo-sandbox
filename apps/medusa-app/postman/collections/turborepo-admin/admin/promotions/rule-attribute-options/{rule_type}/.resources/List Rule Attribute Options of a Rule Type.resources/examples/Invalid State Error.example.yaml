$kind: http-example
request:
  url: "{{baseUrl}}/admin/promotions/rule-attribute-options/:rule_type?promotion_\
    type=buyget&application_method_type=percentage&application_method_target_ty\
    pe=order"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: promotion_type
      value: buyget
      description: The promotion type to retrieve rules for.
    - key: application_method_type
      value: percentage
      description: The application method type to retrieve rules for.
    - key: application_method_target_type
      value: order
      description: The application method target type to retrieve rules for.
  pathVariables:
    - key: rule_type
      value: buy-rules
      description: The rule type.
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "code": "unknown_error",
        "message": "The request conflicted with another request. You may retry the request with the provided Idempotency-Key.",
        "type": "QueryRunnerAlreadyReleasedError"
      }
order: 5000
