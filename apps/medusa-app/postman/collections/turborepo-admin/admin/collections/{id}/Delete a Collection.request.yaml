$kind: http-request
description: Delete a product collection.
url: "{{baseUrl}}/admin/collections/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The collection's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Collection.resources/examples
order: 4000
