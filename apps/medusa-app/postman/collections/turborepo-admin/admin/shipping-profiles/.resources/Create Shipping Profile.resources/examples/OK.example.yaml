$kind: http-example
request:
  url: "{{baseUrl}}/admin/shipping-profiles?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  body:
    type: json
    content: |-
      {
        "name": "string",
        "type": "string",
        "metadata": {}
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "shipping_profile": {
          "id": "string",
          "name": "string",
          "type": "string",
          "metadata": {},
          "created_at": "2004-08-30T22:12:38.304Z",
          "updated_at": "1947-03-19T14:14:24.127Z",
          "deleted_at": "2019-12-09T06:18:01.056Z"
        }
      }
order: 1000
