$kind: http-request
description: Delete a shipping profile.
url: "{{baseUrl}}/admin/shipping-profiles/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The shipping profile's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Shipping Profile.resources/examples
order: 3000
