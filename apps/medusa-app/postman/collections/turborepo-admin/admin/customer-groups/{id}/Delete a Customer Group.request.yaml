$kind: http-request
description: |
  Delete a customer group. Customers in the group aren't deleted.
url: "{{baseUrl}}/admin/customer-groups/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The customer group's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Customer Group.resources/examples
order: 4000
