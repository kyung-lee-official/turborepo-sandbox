$kind: http-example
request:
  url: "{{baseUrl}}/admin/customer-groups/:id?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The customer group's ID.
  body:
    type: json
    content: |-
      {
        "name": "string",
        "metadata": {}
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "customer_group": {
          "id": "string",
          "name": "string",
          "metadata": {},
          "created_at": "1957-10-10T22:06:51.600Z",
          "updated_at": "1968-05-16T00:47:06.956Z"
        }
      }
order: 1000
