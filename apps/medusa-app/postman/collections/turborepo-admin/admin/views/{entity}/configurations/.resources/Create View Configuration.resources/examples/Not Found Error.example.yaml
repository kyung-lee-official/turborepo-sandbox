$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/configurations"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: entity
      value: string
      description: The entity to create its view configuration (for example, `orders`).
  body:
    type: json
    content: |-
      {
        "is_system_default": false,
        "set_active": false,
        "configuration": {
          "visible_columns": [
            "string",
            "string"
          ],
          "column_order": [
            "string",
            "string"
          ],
          "search": "string",
          "column_widths": {},
          "filters": {},
          "sorting": {
            "id": "string",
            "desc": true
          }
        },
        "name": "string"
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
