$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/configurations/active?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. If a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. Without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: entity
      value: string
      description: The entity to retrieve its active view configurations (for example,
        `orders`).
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "view_configuration": {
          "id": "string",
          "entity": "string",
          "name": "string",
          "user_id": "string",
          "is_system_default": false,
          "created_at": "1960-06-05T15:01:40.946Z",
          "updated_at": "1984-08-17T22:00:43.353Z",
          "configuration": {
            "visible_columns": [
              "string",
              "string"
            ],
            "column_order": [
              "string",
              "string"
            ],
            "column_widths": {},
            "filters": {},
            "sorting": {
              "id": "string",
              "desc": true
            },
            "search": "string"
          }
        },
        "is_default_active": false,
        "default_type": "system"
      }
order: 1000
