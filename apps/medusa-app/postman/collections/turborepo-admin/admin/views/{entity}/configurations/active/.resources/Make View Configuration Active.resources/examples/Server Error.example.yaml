$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/configurations/active"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: entity
      value: string
      description: The entity to update its view configuration (for example, `orders`).
  body:
    type: json
    content: |-
      {
        "view_configuration_id": "string"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
