$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/configurations/:id?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. If a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. Without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: entity
      value: string
      description: The entity to retrieve its view configurations (for example, `orders`)
    - key: id
      value: string
      description: The ID of the view configuration to retrieve.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "view_configuration": {
          "id": "string",
          "entity": "string",
          "name": "string",
          "user_id": "string",
          "is_system_default": false,
          "created_at": "1985-01-29T17:00:01.626Z",
          "updated_at": "1960-01-12T05:31:30.629Z",
          "configuration": {
            "visible_columns": [
              "string",
              "string"
            ],
            "column_order": [
              "string",
              "string"
            ],
            "column_widths": {},
            "filters": {},
            "sorting": {
              "id": "string",
              "desc": true
            },
            "search": "string"
          }
        }
      }
order: 1000
