$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/configurations/:id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: entity
      value: string
      description: The entity to update its view configuration (for example, `orders`).
    - key: id
      value: string
      description: The view configuration's ID.
  body:
    type: json
    content: |-
      {
        "set_active": true,
        "name": "string",
        "is_system_default": true,
        "configuration": {
          "search": "string",
          "visible_columns": [
            "string",
            "string"
          ],
          "column_order": [
            "string",
            "string"
          ],
          "column_widths": {},
          "filters": {},
          "sorting": {
            "id": "string",
            "desc": true
          }
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
