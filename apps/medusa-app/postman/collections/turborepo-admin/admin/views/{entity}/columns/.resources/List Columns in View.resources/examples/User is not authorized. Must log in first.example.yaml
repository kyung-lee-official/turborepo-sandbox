$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/columns"
  method: GET
  headers:
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: entity
      value: string
      description: The entity to retrieve its columns (for example, `orders`)
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
