$kind: http-request
description: Retrieve a list of columns in a view for an entity. The columns are
  retrieved for the authenticated admin user.
url: "{{baseUrl}}/admin/views/:entity/columns"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: entity
    value: string
    description: The entity to retrieve its columns (for example, `orders`)
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/List Columns in View.resources/examples
order: 1000
