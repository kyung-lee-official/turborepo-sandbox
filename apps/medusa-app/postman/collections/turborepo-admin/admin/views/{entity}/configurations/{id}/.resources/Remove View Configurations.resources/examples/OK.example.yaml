$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/configurations/:id"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: entity
      value: string
      description: The entity to delete its view configuration (for example, `orders`)
    - key: id
      value: string
      description: The ID of the view configuration to delete
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "string",
        "object": "view_configuration",
        "deleted": true
      }
order: 1000
