$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/configurations/:id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: entity
      value: string
      description: The entity to update its view configuration (for example, `orders`).
    - key: id
      value: string
      description: The view configuration's ID.
  body:
    type: json
    content: |-
      {
        "set_active": true,
        "name": "string",
        "is_system_default": true,
        "configuration": {
          "search": "string",
          "visible_columns": [
            "string",
            "string"
          ],
          "column_order": [
            "string",
            "string"
          ],
          "column_widths": {},
          "filters": {},
          "sorting": {
            "id": "string",
            "desc": true
          }
        }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "view_configuration": {
          "id": "string",
          "entity": "string",
          "name": "string",
          "user_id": "string",
          "is_system_default": false,
          "created_at": "1985-01-29T17:00:01.626Z",
          "updated_at": "1960-01-12T05:31:30.629Z",
          "configuration": {
            "visible_columns": [
              "string",
              "string"
            ],
            "column_order": [
              "string",
              "string"
            ],
            "column_widths": {},
            "filters": {},
            "sorting": {
              "id": "string",
              "desc": true
            },
            "search": "string"
          }
        }
      }
order: 1000
