$kind: http-example
request:
  url: "{{baseUrl}}/admin/views/:entity/configurations/:id"
  method: DELETE
  headers:
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: entity
      value: string
      description: The entity to delete its view configuration (for example, `orders`)
    - key: id
      value: string
      description: The ID of the view configuration to delete
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
