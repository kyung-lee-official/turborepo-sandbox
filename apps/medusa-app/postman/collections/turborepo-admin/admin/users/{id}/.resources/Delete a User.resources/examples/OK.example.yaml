$kind: http-example
request:
  url: "{{baseUrl}}/admin/users/:id"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: connect.sid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: string
      description: The user's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "string",
        "object": "user",
        "deleted": false
      }
order: 1000
