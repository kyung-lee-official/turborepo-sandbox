$kind: http-example
request:
  url: "{{baseUrl}}/admin/users/:id"
  method: DELETE
  headers:
    - key: Accept
      value: text/plain
    - key: connect.sid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: string
      description: The user's ID.
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
