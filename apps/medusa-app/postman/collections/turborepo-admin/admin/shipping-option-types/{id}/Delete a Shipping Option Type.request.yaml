$kind: http-request
description: Delete a shipping option type.
url: "{{baseUrl}}/admin/shipping-option-types/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The shipping option type's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Shipping Option Type.resources/examples
order: 3000
