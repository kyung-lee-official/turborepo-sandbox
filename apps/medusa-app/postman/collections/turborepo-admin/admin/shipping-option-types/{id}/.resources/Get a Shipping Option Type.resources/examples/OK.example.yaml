$kind: http-example
request:
  url: "{{baseUrl}}/admin/shipping-option-types/:id?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: >-
        Comma-separated fields that should be included in the returned data.

        if a field is prefixed with `+` it will be added to the default fields,
        using `-` will remove it from the default fields.

        without prefix it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The shipping option type's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "shipping_option_type": {
          "id": "string",
          "label": "string",
          "description": "string",
          "code": "string",
          "shipping_option_id": "string",
          "created_at": "1996-12-05T21:08:08.313Z",
          "updated_at": "2005-10-07T02:14:45.789Z",
          "deleted_at": "1985-04-15T07:41:30.084Z"
        }
      }
order: 1000
