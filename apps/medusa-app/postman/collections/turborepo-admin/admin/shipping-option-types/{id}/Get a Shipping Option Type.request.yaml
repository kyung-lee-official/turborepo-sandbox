$kind: http-request
description: Retrieve a shipping option type by its ID. You can expand the
  shipping option type's relations or select the fields that should be returned.
url: "{{baseUrl}}/admin/shipping-option-types/:id?fields=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The shipping option type's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Get a Shipping Option Type.resources/examples
order: 1000
