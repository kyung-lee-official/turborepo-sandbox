$kind: http-request
description: Create a shipping option type.
url: "{{baseUrl}}/admin/shipping-option-types?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
body:
  type: json
  content: |-
    {
      "label": "string",
      "code": "string",
      "description": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create Shipping Option Type.resources/examples
order: 3000
