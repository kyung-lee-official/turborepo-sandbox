$kind: http-example
request:
  url: "{{baseUrl}}/admin/return-reasons?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  body:
    type: json
    content: |-
      {
        "value": "string",
        "label": "string",
        "description": "string",
        "parent_return_reason_id": "string",
        "metadata": {}
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "return_reason": {
          "id": "string",
          "value": "string",
          "label": "string",
          "created_at": "1996-12-30T19:15:45.523Z",
          "updated_at": "1961-01-12T21:40:40.544Z",
          "description": "string",
          "metadata": {}
        }
      }
order: 1000
