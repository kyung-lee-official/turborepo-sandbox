$kind: http-example
request:
  url: "{{baseUrl}}/admin/notifications/:id?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The notification's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "notification": {
          "id": "string",
          "to": "string",
          "channel": "email",
          "template": "string",
          "provider_id": "string",
          "created_at": "1952-11-04T12:08:04.727Z",
          "data": {},
          "trigger_type": "order.created",
          "resource_id": "string",
          "resource_type": "order",
          "receiver_id": "string",
          "original_notification_id": "string",
          "external_id": "string"
        }
      }
order: 1000
