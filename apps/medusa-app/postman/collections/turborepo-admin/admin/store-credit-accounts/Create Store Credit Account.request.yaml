$kind: http-request
description: Create a store credit account.
url: "{{baseUrl}}/admin/store-credit-accounts?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
body:
  type: json
  content: |-
    {
      "currency_code": "usd",
      "customer_id": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create Store Credit Account.resources/examples
order: 3000
