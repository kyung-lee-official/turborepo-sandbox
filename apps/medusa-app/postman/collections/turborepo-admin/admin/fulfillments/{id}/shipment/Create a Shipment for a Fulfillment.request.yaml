$kind: http-request
description: Create a shipment for a fulfillment. The fulfillment must not be
  shipped or canceled.
url: "{{baseUrl}}/admin/fulfillments/:id/shipment?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The fulfillment's ID.
body:
  type: json
  content: |-
    {
      "labels": [
        {
          "tracking_number": "string",
          "tracking_url": "string",
          "label_url": "string"
        },
        {
          "tracking_number": "string",
          "tracking_url": "string",
          "label_url": "string"
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create a Shipment for a Fulfillment.resources/examples
order: 1000
