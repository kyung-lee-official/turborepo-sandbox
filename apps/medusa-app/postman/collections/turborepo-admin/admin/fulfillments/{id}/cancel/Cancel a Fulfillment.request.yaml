$kind: http-request
description: >
  Cancel a fulfillment. The fulfillment can't be shipped or delivered.


  To cancel the fulfillment, the `cancelFulfillment` method of the associated
  fulfillment provider is used.
url: "{{baseUrl}}/admin/fulfillments/:id/cancel?fields=string"
method: POST
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The fulfillment's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Cancel a Fulfillment.resources/examples
order: 1000
