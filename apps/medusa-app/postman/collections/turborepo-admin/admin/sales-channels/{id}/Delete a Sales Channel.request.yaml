$kind: http-request
description: Delete a sales channel.
url: "{{baseUrl}}/admin/sales-channels/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The sales channel's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Sales Channel.resources/examples
order: 4000
