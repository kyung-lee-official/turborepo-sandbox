$kind: http-example
request:
  url: "{{baseUrl}}/admin/sales-channels/:id?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The sales channel's ID.
  body:
    type: json
    content: |-
      {
        "name": "string",
        "description": "string",
        "is_disabled": false,
        "metadata": {}
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "sales_channel": {
          "id": "string",
          "name": "string",
          "description": "string",
          "is_disabled": true,
          "metadata": {},
          "created_at": "1953-12-27T07:05:23.266Z",
          "updated_at": "1958-03-07T12:17:04.855Z",
          "deleted_at": "1992-05-14T10:22:26.413Z"
        }
      }
order: 1000
