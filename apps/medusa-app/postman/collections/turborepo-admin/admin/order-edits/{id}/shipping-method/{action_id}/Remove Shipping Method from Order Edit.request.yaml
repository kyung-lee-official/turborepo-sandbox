$kind: http-request
description: >
  Remove a shipping method in the order edit by the ID of the method's
  `SHIPPING_ADD` action.


  Every shipping method has an `actions` property, whose value is an array of
  actions. You can check the action's name using its `action` property, and use
  the value of the `id` property.
url: "{{baseUrl}}/admin/order-edits/:id/shipping-method/:action_id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order edit's ID.
  - key: action_id
    value: string
    description: The ID of the shipping method's `SHIPPING_ADD` action.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Remove Shipping Method from Order Edit.resources/examples
order: 2000
