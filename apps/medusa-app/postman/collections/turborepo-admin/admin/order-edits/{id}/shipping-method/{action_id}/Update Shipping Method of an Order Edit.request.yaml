$kind: http-request
description: >
  Update a shipping method in the order edit by the ID of the method's
  `SHIPPING_ADD` action.


  Every shipping method has an `actions` property, whose value is an array of
  actions. You can check the action's name using its `action` property, and use
  the value of the `id` property.
url: "{{baseUrl}}/admin/order-edits/:id/shipping-method/:action_id"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order edit's ID.
  - key: action_id
    value: string
    description: The ID of the shipping method's `SHIPPING_ADD` action.
body:
  type: json
  content: |-
    {
      "custom_amount": 2361.8290452567003,
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update Shipping Method of an Order Edit.resources/examples
order: 1000
