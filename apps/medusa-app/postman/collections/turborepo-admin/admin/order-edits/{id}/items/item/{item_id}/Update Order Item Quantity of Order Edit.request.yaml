$kind: http-request
description: >
  Update an existing order item's quantity of an order edit.

  You can also use this API route to remove an item from an order by setting its
  quantity to `0`.
url: "{{baseUrl}}/admin/order-edits/:id/items/item/:item_id"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order edit's ID.
  - key: item_id
    value: string
    description: The order edit's item id.
body:
  type: json
  content: |-
    {
      "quantity": 425.8970083664426,
      "internal_note": "string",
      "unit_price": 1639.8341709447539,
      "compare_at_unit_price": 8528.242915796309
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update Order Item Quantity of Order Edit.resources/examples
order: 1000
