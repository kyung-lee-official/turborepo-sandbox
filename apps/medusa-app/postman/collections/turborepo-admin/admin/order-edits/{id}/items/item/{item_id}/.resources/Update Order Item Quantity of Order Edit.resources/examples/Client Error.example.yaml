$kind: http-example
request:
  url: "{{baseUrl}}/admin/order-edits/:id/items/item/:item_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The order edit's ID.
    - key: item_id
      value: string
      description: The order edit's item id.
  body:
    type: json
    content: |-
      {
        "quantity": 425.8970083664426,
        "internal_note": "string",
        "unit_price": 1639.8341709447539,
        "compare_at_unit_price": 8528.242915796309
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
