$kind: http-example
request:
  url: "{{baseUrl}}/admin/order-edits/:id/shipping-method/:action_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The order edit's ID.
    - key: action_id
      value: string
      description: The ID of the shipping method's `SHIPPING_ADD` action.
  body:
    type: json
    content: |-
      {
        "custom_amount": 2361.8290452567003,
        "internal_note": "string",
        "metadata": {}
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
