$kind: http-request
description: Cancel a requested order edit.
url: "{{baseUrl}}/admin/order-edits/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order edit's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Cancel Order Edit.resources/examples
order: 5000
