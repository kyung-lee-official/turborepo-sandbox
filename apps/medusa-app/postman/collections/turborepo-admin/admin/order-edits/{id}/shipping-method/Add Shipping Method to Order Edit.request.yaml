$kind: http-request
description: Add a shipping method to an exchange. The shipping method will have
  a `SHIPPING_ADD` action.
url: "{{baseUrl}}/admin/order-edits/:id/shipping-method"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order edit's ID.
body:
  type: json
  content: |-
    {
      "shipping_option_id": "string",
      "custom_amount": 9360.255364292716,
      "description": "string",
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Shipping Method to Order Edit.resources/examples
order: 2000
