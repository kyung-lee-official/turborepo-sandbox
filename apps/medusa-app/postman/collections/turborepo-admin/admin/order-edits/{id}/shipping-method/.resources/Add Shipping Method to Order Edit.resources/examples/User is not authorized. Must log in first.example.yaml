$kind: http-example
request:
  url: "{{baseUrl}}/admin/order-edits/:id/shipping-method"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The order edit's ID.
  body:
    type: json
    content: |-
      {
        "shipping_option_id": "string",
        "custom_amount": 9360.255364292716,
        "description": "string",
        "internal_note": "string",
        "metadata": {}
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
