$kind: http-example
request:
  url: "{{baseUrl}}/admin/order-edits/:id/items"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The order edit's ID.
  body:
    type: json
    content: |-
      {
        "items": [
          {
            "variant_id": "string",
            "quantity": 3631.8894005256784,
            "unit_price": 1139.501237665823,
            "internal_note": "string",
            "allow_backorder": false,
            "metadata": {},
            "compare_at_unit_price": 570.4093970071855
          },
          {
            "variant_id": "string",
            "quantity": 8227.904766801088,
            "unit_price": 4256.6708560593415,
            "internal_note": "string",
            "allow_backorder": false,
            "metadata": {},
            "compare_at_unit_price": 3836.0885237396515
          }
        ]
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
