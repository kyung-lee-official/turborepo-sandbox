$kind: http-request
description: Change the status of an active order edit to requested.
url: "{{baseUrl}}/admin/order-edits/:id/request"
method: POST
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order edit's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Request Order Edit.resources/examples
order: 1000
