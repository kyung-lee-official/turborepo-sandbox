$kind: http-request
description: >
  Update an added item in the order edit by the ID of the item's `ITEM_ADD`
  action.


  Every item has an `actions` property, whose value is an array of actions. You
  can check the action's name using its `action` property, and use the value of
  the `id` property.
url: "{{baseUrl}}/admin/order-edits/:id/items/:action_id"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order edit's ID.
  - key: action_id
    value: string
    description: The ID of the new item's `ITEM_ADD` action.
body:
  type: json
  content: |-
    {
      "quantity": 8785.828814746375,
      "internal_note": "string",
      "unit_price": 6585.9520355020695,
      "compare_at_unit_price": 1497.5762549590966
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update an Item in an Order Edit.resources/examples
order: 1000
