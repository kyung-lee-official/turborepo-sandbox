$kind: http-request
description: Cancel a requested return.
url: "{{baseUrl}}/admin/returns/:id/request"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The return's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Cancel Return Request.resources/examples
order: 2000
