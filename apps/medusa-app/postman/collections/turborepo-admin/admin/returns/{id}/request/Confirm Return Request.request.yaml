$kind: http-request
description: >
  Confirm a requested return. The changes are applied on the inventory quantity
  and the order only after the return has been confirmed as received using the
  `/admin/returns/:id/received/confirm`.
url: "{{baseUrl}}/admin/returns/:id/request?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The return's ID.
body:
  type: json
  content: |-
    {
      "no_notification": true
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Confirm Return Request.resources/examples
order: 1000
