$kind: http-request
description: Add a shipping method to a return. The shipping method will have a
  `SHIPPING_ADD` action.
url: "{{baseUrl}}/admin/returns/:id/shipping-method?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The return's ID.
body:
  type: json
  content: |-
    {
      "shipping_option_id": "string",
      "custom_amount": 4207.001499597296,
      "description": "string",
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add a Shipping Method to a Return.resources/examples
order: 2000
