$kind: http-request
description: >
  Update a received item in the return by the ID of the  item's
  `RECEIVE_RETURN_ITEM` action.


  Every item has an `actions` property, whose value is an array of actions. You
  can check the action's name using its `action` property, and use the value of
  the `id` property. return.
url: "{{baseUrl}}/admin/returns/:id/receive-items/:action_id?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The return's ID.
  - key: action_id
    value: string
    description: The ID of the received item's `RECEIVE_RETURN_ITEM` action.
body:
  type: json
  content: |-
    {
      "quantity": 2715.3487247904764,
      "internal_note": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update a Received Item in a Return.resources/examples
order: 1000
