$kind: http-request
description: Add items that are requested to be returned. These items will have
  the action `RETURN_ITEM`.
url: "{{baseUrl}}/admin/returns/:id/request-items?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The return's ID.
body:
  type: json
  content: |-
    {
      "items": [
        {
          "id": "string",
          "quantity": 1390.2881501050879,
          "description": "string",
          "internal_note": "string",
          "metadata": {}
        },
        {
          "id": "string",
          "quantity": 4363.595845151478,
          "description": "string",
          "internal_note": "string",
          "metadata": {}
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Requested Items to Return.resources/examples
order: 2000
