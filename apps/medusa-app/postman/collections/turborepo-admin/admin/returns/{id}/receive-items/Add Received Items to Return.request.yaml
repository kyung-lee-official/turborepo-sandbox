$kind: http-request
description: Add received items in a return. These items will have the action
  `RECEIVE_RETURN_ITEM`.
url: "{{baseUrl}}/admin/returns/:id/receive-items?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The return's ID.
body:
  type: json
  content: |-
    {
      "items": [
        {
          "id": "string",
          "quantity": 2559.213405923786,
          "description": "string",
          "internal_note": "string"
        },
        {
          "id": "string",
          "quantity": 8620.30421573185,
          "description": "string",
          "internal_note": "string"
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Received Items to Return.resources/examples
order: 2000
