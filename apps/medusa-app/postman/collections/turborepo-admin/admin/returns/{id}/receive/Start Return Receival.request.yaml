$kind: http-request
description: Start a return receival process to be later confirmed using the
  `/admin/returns/:id/receive/confirm` API route.
url: "{{baseUrl}}/admin/returns/:id/receive?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The return's ID.
body:
  type: json
  content: |-
    {
      "internal_note": "string",
      "description": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Start Return Receival.resources/examples
order: 2000
