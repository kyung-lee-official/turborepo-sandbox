$kind: http-request
description: >
  Update a shipping method of the return by the ID of the item's `SHIPPING_ADD`
  action.


  Every item has an `actions` property, whose value is an array of actions. You
  can check the action's name using its `action` property, and use the value of
  the `id` property.
url: "{{baseUrl}}/admin/returns/:id/shipping-method/:action_id?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The return's ID.
  - key: action_id
    value: string
    description: The ID of the shipping method's `SHIPPING_ADD` action.
body:
  type: json
  content: |-
    {
      "custom_amount": 741.1686617274138,
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update a Shipping Method of a Return.resources/examples
order: 1000
