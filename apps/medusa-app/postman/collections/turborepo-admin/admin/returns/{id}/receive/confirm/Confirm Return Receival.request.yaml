$kind: http-request
description: >
  Confirm that a return has been received. This updates the quantity of the
  items received, if not damaged, and  reflects the changes on the order.
url: "{{baseUrl}}/admin/returns/:id/receive/confirm?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The return's ID.
body:
  type: json
  content: |-
    {
      "no_notification": false
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Confirm Return Receival.resources/examples
order: 1000
