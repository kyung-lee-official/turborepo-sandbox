$kind: http-request
description: Cancel a return.
url: "{{baseUrl}}/admin/returns/:id/cancel"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The return's ID.
body:
  type: json
  content: |-
    {
      "no_notification": false
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Cancel a return..resources/examples
order: 1000
