$kind: http-request
description: Delete a payment collection.
url: "{{baseUrl}}/admin/payment-collections/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The payment collection's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Payment Collection.resources/examples
order: 2000
