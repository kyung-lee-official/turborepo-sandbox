$kind: http-request
description: >
  Subscribe to a workflow's execution to receive real-time information about its
  steps, status, and data.

  This route returns an event stream that you can consume using the [EventSource
  API](https://developer.mozilla.org/en-US/docs/Web/API/EventSource).
url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/subscribe"
method: GET
headers:
  Accept: text/event-stream
pathVariables:
  - key: workflow_id
    value: string
    description: The workflows execution's workflow id.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Subscribe to a Workflow's Execution.resources/examples
order: 1000
