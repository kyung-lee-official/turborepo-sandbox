$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/steps/success"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflows execution's workflow id.
  body:
    type: json
    content: |-
      {
        "transaction_id": "string",
        "step_id": "string",
        "response": "",
        "compensate_input": "",
        "action": "compensate"
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
