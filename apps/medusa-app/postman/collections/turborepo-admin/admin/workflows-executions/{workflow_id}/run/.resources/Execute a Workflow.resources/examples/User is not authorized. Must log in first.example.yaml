$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/run"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflow's ID.
  body:
    type: json
    content: |-
      {
        "input": "",
        "transaction_id": "string"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
