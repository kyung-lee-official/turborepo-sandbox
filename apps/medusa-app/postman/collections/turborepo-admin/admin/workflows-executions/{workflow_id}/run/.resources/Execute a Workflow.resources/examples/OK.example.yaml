$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/run"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflow's ID.
  body:
    type: json
    content: |-
      {
        "input": "",
        "transaction_id": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "acknowledgement": {
          "workflowId": "string",
          "transactionId": "string",
          "hasFinished": false,
          "hasFailed": false,
          "parentStepIdempotencyKey": "string"
        }
      }
order: 1000
