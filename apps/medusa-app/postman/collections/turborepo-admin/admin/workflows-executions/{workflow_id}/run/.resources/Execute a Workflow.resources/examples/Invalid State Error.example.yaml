$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/run"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflow's ID.
  body:
    type: json
    content: |-
      {
        "input": "",
        "transaction_id": "string"
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "code": "unknown_error",
        "message": "The request conflicted with another request. You may retry the request with the provided Idempotency-Key.",
        "type": "QueryRunnerAlreadyReleasedError"
      }
order: 5000
