$kind: http-request
description: Execute a workflow by its ID.
url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/run"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: workflow_id
    value: string
    description: The workflow's ID.
body:
  type: json
  content: |-
    {
      "input": "",
      "transaction_id": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Execute a Workflow.resources/examples
order: 1000
