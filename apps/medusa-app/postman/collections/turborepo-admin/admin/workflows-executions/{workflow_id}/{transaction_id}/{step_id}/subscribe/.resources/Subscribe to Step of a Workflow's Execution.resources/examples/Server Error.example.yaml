$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/:transaction_id/:step\
    _id/subscribe"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflows execution's workflow id.
    - key: transaction_id
      value: string
      description: The workflows execution's transaction id.
    - key: step_id
      value: string
      description: The workflows execution's step id.
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
