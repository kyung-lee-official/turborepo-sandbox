$kind: http-request
description: >
  Subscribe to a step in a workflow's execution to receive real-time information
  about its status and data.

  This route returns an event stream that you can consume using the [EventSource
  API](https://developer.mozilla.org/en-US/docs/Web/API/EventSource).
url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/:transaction_id/:step\
  _id/subscribe"
method: GET
headers:
  Accept: text/event-stream
pathVariables:
  - key: workflow_id
    value: string
    description: The workflows execution's workflow id.
  - key: transaction_id
    value: string
    description: The workflows execution's transaction id.
  - key: step_id
    value: string
    description: The workflows execution's step id.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Subscribe to Step of a Workflow's Execution.resources/examples
order: 1000
