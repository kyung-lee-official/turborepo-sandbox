$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/:transaction_id/:step\
    _id/subscribe"
  method: GET
  headers:
    - key: Accept
      value: text/event-stream
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflows execution's workflow id.
    - key: transaction_id
      value: string
      description: The workflows execution's transaction id.
    - key: step_id
      value: string
      description: The workflows execution's step id.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: text/event-stream
  body:
    type: text
    content: |-
      event: success
       data: {}
order: 1000
