$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/steps/failure"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflows execution's workflow id.
  body:
    type: json
    content: |-
      {
        "transaction_id": "string",
        "step_id": "string",
        "response": "",
        "compensate_input": "",
        "action": "compensate"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
