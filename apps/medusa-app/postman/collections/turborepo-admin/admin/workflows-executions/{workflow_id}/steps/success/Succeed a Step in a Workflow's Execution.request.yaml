$kind: http-request
description: Set the status of a step in a workflow's execution as successful.
  This is useful for long-running workflows.
url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/steps/success"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: workflow_id
    value: string
    description: The workflows execution's workflow id.
body:
  type: json
  content: |-
    {
      "transaction_id": "string",
      "step_id": "string",
      "response": "",
      "compensate_input": "",
      "action": "compensate"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Succeed a Step in a Workflow's Execution.resources/examples
order: 1000
