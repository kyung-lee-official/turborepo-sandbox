$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/:transaction_id/:step\
    _id/subscribe"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflows execution's workflow id.
    - key: transaction_id
      value: string
      description: The workflows execution's transaction id.
    - key: step_id
      value: string
      description: The workflows execution's step id.
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
