$kind: http-request
description: Get the details of the workflow's execution.
url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/:transaction_id?field\
  s=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: workflow_id
    value: string
    description: The workflows execution's workflow id.
  - key: transaction_id
    value: string
    description: The workflows execution's transaction id.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Get Workflow Execution's Details.resources/examples
order: 2000
