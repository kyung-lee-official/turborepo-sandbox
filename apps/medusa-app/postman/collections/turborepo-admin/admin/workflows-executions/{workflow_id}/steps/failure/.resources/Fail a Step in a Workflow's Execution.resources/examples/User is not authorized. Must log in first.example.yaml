$kind: http-example
request:
  url: "{{baseUrl}}/admin/workflows-executions/:workflow_id/steps/failure"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: workflow_id
      value: string
      description: The workflows execution's workflow id.
  body:
    type: json
    content: |-
      {
        "transaction_id": "string",
        "step_id": "string",
        "response": "",
        "compensate_input": "",
        "action": "compensate"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
