$kind: http-request
description: Create and add a fulfillment set to a stock location.
url: "{{baseUrl}}/admin/stock-locations/:id/fulfillment-sets?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The stock location's ID.
body:
  type: json
  content: |-
    {
      "name": "string",
      "type": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Fulfillment Set to Stock Location.resources/examples
order: 1000
