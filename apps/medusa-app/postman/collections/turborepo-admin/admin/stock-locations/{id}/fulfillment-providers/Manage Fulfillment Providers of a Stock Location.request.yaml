$kind: http-request
description: Manage the fulfillment providers to add or remove them from a stock location.
url: "{{baseUrl}}/admin/stock-locations/:id/fulfillment-providers?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The stock location's ID.
body:
  type: json
  content: |-
    {
      "add": [
        "string",
        "string"
      ],
      "remove": [
        "string",
        "string"
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Manage Fulfillment Providers of a Stock
  Location.resources/examples
order: 1000
