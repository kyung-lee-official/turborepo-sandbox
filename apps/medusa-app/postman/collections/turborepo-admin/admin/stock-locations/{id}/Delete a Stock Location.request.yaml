$kind: http-request
description: Delete a stock location.
url: "{{baseUrl}}/admin/stock-locations/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The stock location's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Stock Location.resources/examples
order: 6000
