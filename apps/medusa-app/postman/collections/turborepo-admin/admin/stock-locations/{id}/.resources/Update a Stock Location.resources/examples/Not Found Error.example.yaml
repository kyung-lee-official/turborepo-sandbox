$kind: http-example
request:
  url: "{{baseUrl}}/admin/stock-locations/:id?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The stock location's ID.
  body:
    type: json
    content: |-
      {
        "name": "string",
        "address": {
          "address_1": "string",
          "country_code": "usd",
          "address_2": "string",
          "company": "string",
          "city": "string",
          "phone": "string",
          "postal_code": "string",
          "province": "us-ca"
        },
        "address_id": "string",
        "metadata": {}
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
