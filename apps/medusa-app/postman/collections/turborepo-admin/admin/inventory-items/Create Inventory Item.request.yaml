$kind: http-request
description: Create an inventory item.
url: "{{baseUrl}}/admin/inventory-items?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
body:
  type: json
  content: |-
    {
      "sku": "string",
      "hs_code": "string",
      "weight": 9495.402611386817,
      "length": 6944.063702938465,
      "height": 1859.4422384443842,
      "width": 6896.82405454904,
      "origin_country": "string",
      "mid_code": "string",
      "material": "string",
      "title": "string",
      "description": "string",
      "requires_shipping": false,
      "thumbnail": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create Inventory Item.resources/examples
order: 4000
