$kind: http-request
description: Retrieve a list of inventory levels associated with an inventory
  item. The inventory levels can be filtered by fields like `location_id`. The
  inventory levels can also be paginated.
url: "{{baseUrl}}/admin/inventory-items/:id/location-levels?fields=string&offse\
  t=3157.9117089204024&limit=3050.1607324519186&order=string&with_deleted=true&\
  location_id=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
  - key: offset
    value: "3157.9117089204024"
    description: The number of items to skip when retrieving a list.
  - key: limit
    value: "3050.1607324519186"
    description: Limit the number of items returned in the list.
  - key: order
    value: string
    description: The field to sort the data by. By default, the sort order is
      ascending. To change the order to descending, prefix the field name with
      `-`.
  - key: with_deleted
    value: "true"
    description: Whether to include deleted records in the result.
  - key: location_id
    value: string
pathVariables:
  - key: id
    value: string
    description: The inventory item's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/List Inventory Levels.resources/examples
order: 3000
