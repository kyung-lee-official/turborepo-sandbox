$kind: http-request
description: Delete an inventory item.
url: "{{baseUrl}}/admin/inventory-items/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The inventory item's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete Inventory Item.resources/examples
order: 4000
