$kind: http-request
description: Update an inventory item's details.
url: "{{baseUrl}}/admin/inventory-items/:id?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The inventory item's ID.
body:
  type: json
  content: |-
    {
      "sku": "string",
      "hs_code": "string",
      "weight": 6705.490388797144,
      "length": 716.4281337060152,
      "height": 6704.556421541232,
      "width": 5992.856678673402,
      "origin_country": "string",
      "mid_code": "string",
      "material": "string",
      "title": "string",
      "description": "string",
      "requires_shipping": true,
      "thumbnail": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update an Inventory Item.resources/examples
order: 3000
