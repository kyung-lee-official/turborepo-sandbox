$kind: http-example
request:
  url: "{{baseUrl}}/admin/inventory-items/:id/location-levels/:location_id?fields\
    =string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The inventory item's ID.
    - key: location_id
      value: string
      description: The ID of the location associated with the inventory level.
  body:
    type: json
    content: |-
      {
        "stocked_quantity": 1796.5356537321186,
        "incoming_quantity": 5513.70681107864
      }
