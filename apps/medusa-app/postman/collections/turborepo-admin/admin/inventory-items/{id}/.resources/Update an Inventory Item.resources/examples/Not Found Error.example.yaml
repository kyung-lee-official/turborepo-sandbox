$kind: http-example
request:
  url: "{{baseUrl}}/admin/inventory-items/:id?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The inventory item's ID.
  body:
    type: json
    content: |-
      {
        "sku": "string",
        "hs_code": "string",
        "weight": 6705.490388797144,
        "length": 716.4281337060152,
        "height": 6704.556421541232,
        "width": 5992.856678673402,
        "origin_country": "string",
        "mid_code": "string",
        "material": "string",
        "title": "string",
        "description": "string",
        "requires_shipping": true,
        "thumbnail": "string",
        "metadata": {}
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
