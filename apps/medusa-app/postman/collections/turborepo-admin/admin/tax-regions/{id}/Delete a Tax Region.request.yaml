$kind: http-request
description: Delete a tax region.
url: "{{baseUrl}}/admin/tax-regions/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The tax region's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Tax Region.resources/examples
order: 3000
