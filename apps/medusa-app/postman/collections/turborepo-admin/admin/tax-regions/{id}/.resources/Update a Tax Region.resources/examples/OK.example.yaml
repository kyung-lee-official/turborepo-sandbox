$kind: http-example
request:
  url: "{{baseUrl}}/admin/tax-regions/:id?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: >-
        Comma-separated fields that should be included in the returned data.

        if a field is prefixed with `+` it will be added to the default fields,
        using `-` will remove it from the default fields.

        without prefix it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The tax region's ID.
  body:
    type: json
    content: |-
      {
        "province_code": "us-ca",
        "metadata": {},
        "provider_id": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "tax_region": {
          "id": "string",
          "country_code": "us",
          "province_code": "us-ca",
          "metadata": {},
          "parent_id": "string",
          "created_at": "1981-01-08T02:26:29.344Z",
          "updated_at": "1993-07-05T03:08:28.006Z",
          "deleted_at": "1982-07-29T21:07:00.389Z",
          "created_by": "string",
          "parent": {}
        }
      }
order: 1000
