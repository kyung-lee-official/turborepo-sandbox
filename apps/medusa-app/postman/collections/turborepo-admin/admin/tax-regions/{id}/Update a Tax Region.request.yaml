$kind: http-request
description: Update a tax region's details.
url: "{{baseUrl}}/admin/tax-regions/:id?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The tax region's ID.
body:
  type: json
  content: |-
    {
      "province_code": "us-ca",
      "metadata": {},
      "provider_id": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update a Tax Region.resources/examples
order: 2000
