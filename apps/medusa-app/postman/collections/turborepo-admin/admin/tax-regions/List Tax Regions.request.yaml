$kind: http-request
description: Retrieve a list of tax regions. The tax regions can be filtered by
  fields such as `id`. The tax regions can also be sorted or paginated.
url: "{{baseUrl}}/admin/tax-regions?fields=string&offset=3157.9117089204024&lim\
  it=3050.1607324519186&order=string&q=string&id=string&country_code=string&pro\
  vince_code=us-ca&parent_id=string&created_by=string&created_at=string&updated\
  _at=string&deleted_at=string&with_deleted=true"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
  - key: offset
    value: "3157.9117089204024"
    description: The number of items to skip when retrieving a list.
  - key: limit
    value: "3050.1607324519186"
    description: Limit the number of items returned in the list.
  - key: order
    value: string
    description: The field to sort the data by. By default, the sort order is
      ascending. To change the order to descending, prefix the field name with
      `-`.
  - key: q
    value: string
    description: Search term to filter a tax region's searchable properties.
  - key: id
    value: string
  - key: country_code
    value: string
  - key: province_code
    value: us-ca
  - key: parent_id
    value: string
  - key: created_by
    value: string
  - key: created_at
    value: string
    description: Filter by a tax region's creation date.
  - key: updated_at
    value: string
    description: Filter by a tax region's update date.
  - key: deleted_at
    value: string
    description: Filter by a tax region's deletion date.
  - key: with_deleted
    value: "true"
    description: Whether to include deleted records in the result.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/List Tax Regions.resources/examples
order: 2000
