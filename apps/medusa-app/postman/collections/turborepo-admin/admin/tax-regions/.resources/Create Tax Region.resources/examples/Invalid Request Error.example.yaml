$kind: http-example
request:
  url: "{{baseUrl}}/admin/tax-regions?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  body:
    type: json
    content: |-
      {
        "country_code": "us",
        "province_code": "us-ca",
        "parent_id": "string",
        "default_tax_rate": {
          "code": "string",
          "name": "VAT",
          "rate": 10,
          "is_combinable": false,
          "metadata": {}
        },
        "metadata": {},
        "provider_id": "string"
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
