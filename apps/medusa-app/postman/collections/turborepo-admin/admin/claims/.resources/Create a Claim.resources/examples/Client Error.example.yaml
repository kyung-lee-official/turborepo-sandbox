$kind: http-example
request:
  url: "{{baseUrl}}/admin/claims?fields=string&id=string&status=string&$eq=string\
    &$ne=string&$in=string,string&$nin=string,string&$not=string&$gt=string&$gt\
    e=string&$lt=string&$lte=string&$like=string&$re=string&$ilike=string&$full\
    text=string&$overlap=string,string&$contains=string,string&$contained=strin\
    g,string&$exists=false"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: id
      value: string
    - key: status
      value: string
    - key: $eq
      value: string
      description: Filter by a claim's creation date.
    - key: $ne
      value: string
      description: Filter by a claim's creation date.
    - key: $in
      value: string,string
      description: Filter by a claim's creation date.
    - key: $nin
      value: string,string
      description: Filter by a claim's creation date.
    - key: $not
      value: string
      description: Filter by a claim's creation date.
    - key: $gt
      value: string
      description: Filter by a claim's creation date.
    - key: $gte
      value: string
      description: Filter by a claim's creation date.
    - key: $lt
      value: string
      description: Filter by a claim's creation date.
    - key: $lte
      value: string
      description: Filter by a claim's creation date.
    - key: $like
      value: string
      description: Filter by a claim's creation date.
    - key: $re
      value: string
      description: Filter by a claim's creation date.
    - key: $ilike
      value: string
      description: Filter by a claim's creation date.
    - key: $fulltext
      value: string
      description: Filter by a claim's creation date.
    - key: $overlap
      value: string,string
      description: Filter by a claim's creation date.
    - key: $contains
      value: string,string
      description: Filter by a claim's creation date.
    - key: $contained
      value: string,string
      description: Filter by a claim's creation date.
    - key: $exists
      value: "false"
      description: Filter by a claim's creation date.
  body:
    type: json
    content: |-
      {
        "type": "replace",
        "order_id": "string",
        "description": "string",
        "internal_note": "string",
        "reason_id": "string",
        "metadata": {}
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
