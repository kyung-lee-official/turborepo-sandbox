$kind: http-request
description: >
  Add an inbound (or return) shipping method to a claim. The inbound shipping
  method will have a `SHIPPING_ADD` action.
url: "{{baseUrl}}/admin/claims/:id/inbound/shipping-method"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The claim's ID.
body:
  type: json
  content: |-
    {
      "shipping_option_id": "string",
      "custom_amount": 7502.836443670427,
      "description": "string",
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add an Inbound Shipping Method to a Claim.resources/examples
order: 2000
