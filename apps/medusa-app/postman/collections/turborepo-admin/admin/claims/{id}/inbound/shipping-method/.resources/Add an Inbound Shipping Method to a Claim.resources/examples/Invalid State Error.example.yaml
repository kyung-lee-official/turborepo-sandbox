$kind: http-example
request:
  url: "{{baseUrl}}/admin/claims/:id/inbound/shipping-method"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The claim's ID.
  body:
    type: json
    content: |-
      {
        "shipping_option_id": "string",
        "custom_amount": 7502.836443670427,
        "description": "string",
        "internal_note": "string",
        "metadata": {}
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "code": "unknown_error",
        "message": "The request conflicted with another request. You may retry the request with the provided Idempotency-Key.",
        "type": "QueryRunnerAlreadyReleasedError"
      }
order: 5000
