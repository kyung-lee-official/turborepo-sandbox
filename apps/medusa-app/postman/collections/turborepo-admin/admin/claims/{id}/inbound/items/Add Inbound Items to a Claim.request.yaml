$kind: http-request
description: >
  Add inbound (or return) items to a claim. These inbound items will have a
  `RETURN_ITEM` action.
url: "{{baseUrl}}/admin/claims/:id/inbound/items"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The claim's ID.
body:
  type: json
  content: |-
    {
      "items": [
        {
          "id": "string",
          "quantity": 6785.9241280319375,
          "description": "string",
          "internal_note": "string",
          "reason_id": "string",
          "metadata": {}
        },
        {
          "id": "string",
          "quantity": 5193.552962709553,
          "description": "string",
          "internal_note": "string",
          "reason_id": "string",
          "metadata": {}
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Inbound Items to a Claim.resources/examples
order: 2000
