$kind: http-example
request:
  url: "{{baseUrl}}/admin/claims/:id/inbound/items"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The claim's ID.
  body:
    type: json
    content: |-
      {
        "items": [
          {
            "id": "string",
            "quantity": 6785.9241280319375,
            "description": "string",
            "internal_note": "string",
            "reason_id": "string",
            "metadata": {}
          },
          {
            "id": "string",
            "quantity": 5193.552962709553,
            "description": "string",
            "internal_note": "string",
            "reason_id": "string",
            "metadata": {}
          }
        ]
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
