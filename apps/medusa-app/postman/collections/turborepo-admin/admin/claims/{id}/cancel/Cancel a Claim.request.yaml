$kind: http-request
description: Cancel a claim and its associated return.
url: "{{baseUrl}}/admin/claims/:id/cancel"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The claim's ID.
body:
  type: json
  content: |-
    {
      "no_notification": false
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Cancel a Claim.resources/examples
order: 1000
