$kind: http-example
request:
  url: "{{baseUrl}}/admin/claims/:id/inbound/items/:action_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The claim's ID.
    - key: action_id
      value: string
      description: The ID of the return item's `RETURN_ITEM` action.
  body:
    type: json
    content: |-
      {
        "quantity": 1504.7330032242457,
        "internal_note": "string",
        "reason_id": "string",
        "metadata": {}
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
