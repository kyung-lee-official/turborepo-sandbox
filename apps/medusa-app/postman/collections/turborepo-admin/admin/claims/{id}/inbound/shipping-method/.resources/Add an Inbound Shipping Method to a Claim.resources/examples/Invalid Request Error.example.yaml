$kind: http-example
request:
  url: "{{baseUrl}}/admin/claims/:id/inbound/shipping-method"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The claim's ID.
  body:
    type: json
    content: |-
      {
        "shipping_option_id": "string",
        "custom_amount": 7502.836443670427,
        "description": "string",
        "internal_note": "string",
        "metadata": {}
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
