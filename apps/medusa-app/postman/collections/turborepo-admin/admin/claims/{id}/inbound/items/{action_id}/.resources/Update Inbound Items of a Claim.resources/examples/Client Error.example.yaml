$kind: http-example
request:
  url: "{{baseUrl}}/admin/claims/:id/inbound/items/:action_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The claim's ID.
    - key: action_id
      value: string
      description: The ID of the return item's `RETURN_ITEM` action.
  body:
    type: json
    content: |-
      {
        "quantity": 1504.7330032242457,
        "internal_note": "string",
        "reason_id": "string",
        "metadata": {}
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
