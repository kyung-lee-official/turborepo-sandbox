$kind: http-request
description: Cancel a requested claim.
url: "{{baseUrl}}/admin/claims/:id/request"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The claim's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Cancel Claim Request.resources/examples
order: 2000
