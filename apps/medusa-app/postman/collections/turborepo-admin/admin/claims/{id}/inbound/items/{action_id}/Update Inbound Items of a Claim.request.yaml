$kind: http-request
description: >
  Update an inbound (or return) item of a claim using the `ID` of the item's
  `RETURN_ITEM` action.


  Every item has an `actions` property, whose value is an array of actions. You
  can check the action's name using its `action` property, and use the value of
  the `id` property.
url: "{{baseUrl}}/admin/claims/:id/inbound/items/:action_id"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The claim's ID.
  - key: action_id
    value: string
    description: The ID of the return item's `RETURN_ITEM` action.
body:
  type: json
  content: |-
    {
      "quantity": 1504.7330032242457,
      "internal_note": "string",
      "reason_id": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update Inbound Items of a Claim.resources/examples
order: 1000
