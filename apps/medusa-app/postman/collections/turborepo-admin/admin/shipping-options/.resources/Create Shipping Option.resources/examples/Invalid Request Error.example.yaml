$kind: http-example
request:
  url: "{{baseUrl}}/admin/shipping-options?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  body:
    type: json
    content: |-
      {
        "price_type": "calculated",
        "prices": [
          {
            "currency_code": "usd",
            "amount": 6956.848099176605,
            "rules": [
              {
                "attribute": "string",
                "operator": "gt",
                "value": 1584.5833630371576
              },
              {
                "attribute": "string",
                "operator": "gte",
                "value": 4469.876356542563
              }
            ]
          },
          {
            "currency_code": "usd",
            "amount": 2626.175350230924,
            "rules": [
              {
                "attribute": "string",
                "operator": "lte",
                "value": 9918.897402932618
              },
              {
                "attribute": "string",
                "operator": "gt",
                "value": 9804.214345723884
              }
            ]
          }
        ],
        "name": "string",
        "service_zone_id": "string",
        "shipping_profile_id": "string",
        "provider_id": "string",
        "data": {},
        "type": {
          "label": "string",
          "code": "string",
          "description": "string"
        },
        "type_id": "string",
        "rules": [
          {
            "operator": "gte",
