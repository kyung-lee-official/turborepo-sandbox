            "value": "cusgroup_123"
          },
          {
            "operator": "ne",
            "attribute": "customer_group",
            "value": "cusgroup_123"
          }
        ],
        "metadata": {}
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
