$kind: http-example
request:
  url: "{{baseUrl}}/admin/shipping-options/:id/rules/batch?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The shipping option's ID.
  body:
    type: json
    content: |-
      {
        "create": [
          {
            "operator": "ne",
            "attribute": "customer_group",
            "value": "cusgroup_123"
          },
          {
            "operator": "nin",
            "attribute": "customer_group",
            "value": "cusgroup_123"
          }
        ],
        "update": [
          {
            "id": "string",
            "operator": "gte",
            "attribute": "customer_group",
            "value": "cusgroup_123"
          },
          {
            "id": "string",
            "operator": "eq",
            "attribute": "customer_group",
            "value": "cusgroup_123"
          }
        ],
        "delete": [
          "string",
          "string"
        ]
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
