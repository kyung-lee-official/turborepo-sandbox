$kind: http-request
description: Manage the rules of a shipping option to create, update, or delete them.
url: "{{baseUrl}}/admin/shipping-options/:id/rules/batch?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The shipping option's ID.
body:
  type: json
  content: |-
    {
      "create": [
        {
          "operator": "ne",
          "attribute": "customer_group",
          "value": "cusgroup_123"
        },
        {
          "operator": "nin",
          "attribute": "customer_group",
          "value": "cusgroup_123"
        }
      ],
      "update": [
        {
          "id": "string",
          "operator": "gte",
          "attribute": "customer_group",
          "value": "cusgroup_123"
        },
        {
          "id": "string",
          "operator": "eq",
          "attribute": "customer_group",
          "value": "cusgroup_123"
        }
      ],
      "delete": [
        "string",
        "string"
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Manage the Rules of a Shipping Option.resources/examples
order: 1000
