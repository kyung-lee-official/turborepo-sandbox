        "provider_id": "string",
        "shipping_profile_id": "string",
        "type": {
          "label": "string",
          "code": "string",
          "description": "string"
        },
        "type_id": "string",
        "prices": [
          {
            "id": "string",
            "currency_code": "string",
            "amount": 8032.069745896235,
            "rules": [
              {
                "attribute": "string",
                "operator": "eq",
                "value": 7318.784512425038
              },
              {
                "attribute": "string",
                "operator": "lte",
                "value": 2006.460347243335
              }
            ]
          },
          {
            "id": "string",
            "currency_code": "string",
            "amount": 1538.2924302195368,
            "rules": [
              {
                "attribute": "string",
