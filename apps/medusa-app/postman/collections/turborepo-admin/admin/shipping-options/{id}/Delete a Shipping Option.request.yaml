$kind: http-request
description: Delete a shipping option.
url: "{{baseUrl}}/admin/shipping-options/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The shipping option's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Shipping Option.resources/examples
order: 4000
