$kind: http-request
description: Delete a reservation.
url: "{{baseUrl}}/admin/reservations/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The reservation's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Reservation.resources/examples
order: 3000
