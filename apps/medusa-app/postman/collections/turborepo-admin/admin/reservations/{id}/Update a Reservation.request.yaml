$kind: http-request
description: Update a reservation's details.
url: "{{baseUrl}}/admin/reservations/:id?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The reservation's ID.
body:
  type: json
  content: |-
    {
      "location_id": "string",
      "quantity": 3148.3199770817528,
      "description": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update a Reservation.resources/examples
order: 2000
