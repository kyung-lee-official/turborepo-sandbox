$kind: http-example
request:
  url: "{{baseUrl}}/admin/refund-reasons?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  body:
    type: json
    content: |-
      {
        "label": "string",
        "code": "string",
        "description": "string",
        "metadata": {}
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "refund_reason": {
          "id": "string",
          "label": "string",
          "code": "string",
          "created_at": "1995-04-04T07:36:12.776Z",
          "updated_at": "2018-03-28T05:26:18.366Z",
          "description": "string",
          "metadata": {}
        }
      }
order: 1000
