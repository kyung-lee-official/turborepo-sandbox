$kind: http-request
description: Delete a refund reason.
url: "{{baseUrl}}/admin/refund-reasons/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The refund reason's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Refund Reason.resources/examples
order: 3000
