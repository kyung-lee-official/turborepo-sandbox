$kind: http-example
request:
  url: "{{baseUrl}}/admin/invites/accept"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: connect.sid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "J3qY@hsvPkOpEytsNZYsFVvfCcYkfe.tza",
        "first_name": "string",
        "last_name": "string"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
