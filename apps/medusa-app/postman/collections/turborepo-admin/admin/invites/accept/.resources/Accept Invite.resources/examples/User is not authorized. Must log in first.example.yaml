$kind: http-example
request:
  url: "{{baseUrl}}/admin/invites/accept"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: connect.sid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "J3qY@hsvPkOpEytsNZYsFVvfCcYkfe.tza",
        "first_name": "string",
        "last_name": "string"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
