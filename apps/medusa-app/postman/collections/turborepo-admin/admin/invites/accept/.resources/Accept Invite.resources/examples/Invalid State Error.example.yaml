$kind: http-example
request:
  url: "{{baseUrl}}/admin/invites/accept"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: connect.sid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "J3qY@hsvPkOpEytsNZYsFVvfCcYkfe.tza",
        "first_name": "string",
        "last_name": "string"
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "code": "unknown_error",
        "message": "The request conflicted with another request. You may retry the request with the provided Idempotency-Key.",
        "type": "QueryRunnerAlreadyReleasedError"
      }
order: 5000
