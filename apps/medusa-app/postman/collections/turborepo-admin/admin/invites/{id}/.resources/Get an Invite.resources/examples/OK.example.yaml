$kind: http-example
request:
  url: "{{baseUrl}}/admin/invites/:id?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The invite's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "invite": {
          "id": "string",
          "email": "YVOB-IANhyb9@OfyqIhlduSKOGvtYMMJE.tbtg",
          "accepted": false,
          "token": "string",
          "expires_at": "2000-05-29T05:20:43.648Z",
          "created_at": "1988-08-12T07:54:04.101Z",
          "updated_at": "1985-04-22T21:09:24.577Z",
          "metadata": {}
        }
      }
order: 1000
