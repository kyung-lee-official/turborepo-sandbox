$kind: http-request
description: Delete an invite.
url: "{{baseUrl}}/admin/invites/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The invite's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete Invite.resources/examples
order: 3000
