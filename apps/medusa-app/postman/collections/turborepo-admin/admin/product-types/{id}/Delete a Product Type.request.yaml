$kind: http-request
description: Delete a product type. This doesn't delete products of this type.
url: "{{baseUrl}}/admin/product-types/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The product type's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Product Type.resources/examples
order: 3000
