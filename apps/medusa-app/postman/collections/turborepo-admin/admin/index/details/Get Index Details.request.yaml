$kind: http-request
description: Retrieve index metadata, including entity type, status, last synced
  key, and last updated timestamp.
url: "{{baseUrl}}/admin/index/details"
method: GET
headers:
  Accept: application/json
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Get Index Details.resources/examples
order: 1000
