$kind: http-example
request:
  url: "{{baseUrl}}/admin/locales/:code?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. If a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. Without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: code
      value: fr-FR
      description: The locale's code in [BCP 47
        format](https://gist.github.com/typpo/b2b828a35e683b9bf8db91b5404f1bd1).
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "locale": {
          "code": "fr-FR",
          "name": "string",
          "created_at": "1961-12-10T17:59:32.246Z",
          "updated_at": "2024-03-13T10:26:28.931Z",
          "deleted_at": "1973-07-18T20:39:05.329Z"
        }
      }
order: 1000
