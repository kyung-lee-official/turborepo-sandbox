$kind: http-request
description: Retrieve a list of locales. The locales can be filtered by fields
  such as `code`. The locales can also be sorted or paginated.
url: "{{baseUrl}}/admin/locales?q=string&code=string&limit=3050.1607324519186&o\
  ffset=3157.9117089204024&order=string&with_deleted=true&fields=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: q
    value: string
    description: Search query to filter locales by code or other fields.
  - key: code
    value: string
  - key: limit
    value: "3050.1607324519186"
    description: Limit the number of items returned in the list.
  - key: offset
    value: "3157.9117089204024"
    description: The number of items to skip when retrieving a list.
  - key: order
    value: string
    description: The field to sort the data by. By default, the sort order is
      ascending. To change the order to descending, prefix the field name with
      `-`.
  - key: with_deleted
    value: "true"
    description: The locale's with deleted.
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. If a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. Without prefix
      it will replace the entire default fields.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/List Locales.resources/examples
order: 2000
