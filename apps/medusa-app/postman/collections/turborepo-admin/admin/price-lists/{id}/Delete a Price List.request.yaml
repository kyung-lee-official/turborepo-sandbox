$kind: http-request
description: Delete a price list.
url: "{{baseUrl}}/admin/price-lists/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The price list's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Price List.resources/examples
order: 5000
