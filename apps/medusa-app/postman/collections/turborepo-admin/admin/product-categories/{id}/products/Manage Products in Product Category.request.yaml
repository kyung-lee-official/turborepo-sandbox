$kind: http-request
description: Manage products of a category to add or remove them.
url: "{{baseUrl}}/admin/product-categories/:id/products?fields=string&include_a\
  ncestors_tree=true&include_descendants_tree=true"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields. This API route restricts the
      fields that can be selected. Learn how to override the retrievable fields
      in the [Retrieve Custom
      Links](https://docs.medusajs.com/learn/fundamentals/api-routes/retrieve-custom-links)
      documentation.
  - key: include_ancestors_tree
    value: "true"
    description: Whether to retrieve the category's parent. If you enable this, add
      to the `fields` query parameter `parent_category` to set the parent of a
      category in this field. You can either pass `*parent_category` to
      retreieve the fields of all parent categories, or select specific fields
      to make the response size smaller. For example,
      `fields=parent_category.id,parent_category.name`.
  - key: include_descendants_tree
    value: "true"
    description: Whether to retrieve a list of child categories. If you enable this,
      add to the `fields` query parameter `category_children` to set the child
      of a category in this field. You can either pass `*category_children` to
      retreieve the fields of all child categories, or select specific fields to
      make the response size smaller. For example,
      `fields=category_children.id,category_children.name`.
pathVariables:
  - key: id
    value: string
    description: The product category's ID.
body:
  type: json
  content: |-
    {
      "add": [
        "string",
        "string"
      ],
      "remove": [
        "string",
        "string"
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Manage Products in Product Category.resources/examples
order: 1000
