$kind: http-request
description: Delete a product category. This doesn't deleted products in that category.
url: "{{baseUrl}}/admin/product-categories/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The product category's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Product Category.resources/examples
order: 4000
