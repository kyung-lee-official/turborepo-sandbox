$kind: http-example
request:
  url: "{{baseUrl}}/admin/price-preferences?fields=string&offset=3157.91170892040\
    24&limit=3050.1607324519186&order=string&id=string&attribute=string&value=s\
    tring&q=string&with_deleted=true"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: offset
      value: "3157.9117089204024"
      description: The number of items to skip when retrieving a list.
    - key: limit
      value: "3050.1607324519186"
      description: Limit the number of items returned in the list.
    - key: order
      value: string
      description: The field to sort the data by. By default, the sort order is
        ascending. To change the order to descending, prefix the field name with
        `-`.
    - key: id
      value: string
    - key: attribute
      value: string
    - key: value
      value: string
    - key: q
      value: string
      description: Search term to apply on the price preference's searchable properties.
    - key: with_deleted
      value: "true"
      description: Whether to include deleted records in the result.
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
