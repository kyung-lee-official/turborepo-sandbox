$kind: http-example
request:
  url: "{{baseUrl}}/admin/price-preferences/:id?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The price preference's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "price_preference": {
          "id": "string",
          "attribute": "region_id",
          "value": "reg_123",
          "is_tax_inclusive": true,
          "created_at": "1978-07-28T15:50:08.319Z",
          "updated_at": "2009-05-15T21:22:40.588Z",
          "deleted_at": "1987-03-27T22:58:33.923Z"
        }
      }
order: 1000
