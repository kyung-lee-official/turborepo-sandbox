$kind: http-request
description: Delete a price preference.
url: "{{baseUrl}}/admin/price-preferences/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The price preference's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Price Preference.resources/examples
order: 3000
