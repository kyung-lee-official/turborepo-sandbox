$kind: http-example
request:
  url: "{{baseUrl}}/admin/campaigns?fields=string&offset=3157.9117089204024&limit\
    =3050.1607324519186&order=string&with_deleted=true&q=string&campaign_identi\
    fier=string&currency_code=usd"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: offset
      value: "3157.9117089204024"
      description: The number of items to skip when retrieving a list.
    - key: limit
      value: "3050.1607324519186"
      description: Limit the number of items returned in the list.
    - key: order
      value: string
      description: The field to sort the data by. By default, the sort order is
        ascending. To change the order to descending, prefix the field name with
        `-`.
    - key: with_deleted
      value: "true"
      description: Whether to include deleted records in the result.
    - key: q
      value: string
      description: Apply a search query to the campaign's searchable properties.
    - key: campaign_identifier
      value: string
      description: Filter by a campaign identifier.
    - key: currency_code
      value: usd
      description: Filter by the campaign's budget.
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
