        },
        "starts_at": "1989-12-11T20:48:11.000Z",
        "ends_at": "2011-09-01T00:50:24.829Z",
        "promotions": [
          {
            "id": "string"
          },
          {
            "id": "string"
          }
        ],
        "additional_data": {}
      }
