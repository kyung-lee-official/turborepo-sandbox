$kind: http-request
description: Create a campaign.
url: "{{baseUrl}}/admin/campaigns?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
body:
  type: json
  content: |-
    {
      "name": "string",
      "campaign_identifier": "string",
      "description": "string",
      "budget": {
        "type": "spend",
        "limit": 40.18059383337879,
        "currency_code": "string"
      },
      "starts_at": "1989-12-11T20:48:11.000Z",
      "ends_at": "2011-09-01T00:50:24.829Z",
      "promotions": [
        {
          "id": "string"
        },
        {
          "id": "string"
        }
      ],
      "additional_data": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create Campaign.resources/examples
order: 3000
