$kind: http-example
request:
  url: "{{baseUrl}}/admin/campaigns/:id?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The campaign's ID.
  body:
    type: json
    content: |-
      {
        "description": "string",
        "starts_at": "2001-07-27T12:48:00.634Z",
        "ends_at": "2019-07-15T01:29:02.811Z",
        "name": "string",
        "campaign_identifier": "string",
        "budget": {
          "limit": 2012.9623928492913
        },
        "promotions": [
          {
            "id": "string"
          },
          {
            "id": "string"
          }
        ],
        "additional_data": {}
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
