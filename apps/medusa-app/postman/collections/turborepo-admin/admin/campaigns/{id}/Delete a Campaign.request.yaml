$kind: http-request
description: >
  Delete a campaign by its ID. This doesn't delete promotions that belong to
  this campaign.
url: "{{baseUrl}}/admin/campaigns/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The campaign's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Campaign.resources/examples
order: 4000
