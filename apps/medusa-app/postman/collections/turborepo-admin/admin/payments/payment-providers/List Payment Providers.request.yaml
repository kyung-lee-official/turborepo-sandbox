$kind: http-request
description: Retrieve a list of payment providers. The payment providers can be
  filtered by fields such as `id`. The payment providers can also be sorted or
  paginated.
url: "{{baseUrl}}/admin/payments/payment-providers?fields=string&offset=3157.91\
  17089204024&limit=3050.1607324519186&order=string&id=string&is_enabled=true&w\
  ith_deleted=true"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
  - key: offset
    value: "3157.9117089204024"
    description: The number of items to skip when retrieving a list.
  - key: limit
    value: "3050.1607324519186"
    description: Limit the number of items returned in the list.
  - key: order
    value: string
    description: The field to sort the data by. By default, the sort order is
      ascending. To change the order to descending, prefix the field name with
      `-`.
  - key: id
    value: string
  - key: is_enabled
    value: "true"
    description: Filter by whether the payment provider is enabled.
  - key: with_deleted
    value: "true"
    description: Whether to include deleted records in the result.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/List Payment Providers.resources/examples
order: 1000
