$kind: http-example
request:
  url: "{{baseUrl}}/admin/api-keys/:id?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The API key's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "api_key": {
          "id": "string",
          "token": "string",
          "redacted": "sk_...123",
          "title": "string",
          "type": "publishable",
          "last_used_at": "2020-10-05T07:26:57.214Z",
          "created_by": "string",
          "created_at": "1997-08-28T23:10:42.865Z",
          "updated_at": "2012-06-20T08:10:45.472Z",
          "revoked_by": "string",
          "revoked_at": "2002-08-21T04:13:12.672Z",
          "deleted_at": "1998-02-04T21:57:53.262Z"
        }
      }
order: 1000
