$kind: http-request
description: >
  Revokes an API key. If the API key is a secret, it can't be used for
  authentication anymore. If it's publishable, it can't be used by client
  applications.
url: "{{baseUrl}}/admin/api-keys/:id/revoke?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The API key's ID.
body:
  type: json
  content: |-
    {
      "revoke_in": 4472.378193146349
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Revoke API Key.resources/examples
order: 1000
