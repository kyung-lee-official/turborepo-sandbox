$kind: http-request
description: Create a new product import process. The products aren't imported
  until the import is confirmed with the
  `/admin/products/:transaction-id/import` API route.
url: "{{baseUrl}}/admin/products/import"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "file": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create Product Import.resources/examples
order: 2000
