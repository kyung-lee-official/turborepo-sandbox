$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/import/:transaction_id/confirm"
  method: POST
  headers:
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: transaction_id
      value: string
      description: The ID of the transaction returned when the product import was created.
response:
  statusCode: 202
  statusText: Accepted
  body:
    type: text
    content: ""
order: 1000
