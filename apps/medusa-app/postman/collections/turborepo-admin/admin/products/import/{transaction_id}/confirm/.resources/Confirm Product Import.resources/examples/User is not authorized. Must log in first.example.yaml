$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/import/:transaction_id/confirm"
  method: POST
  headers:
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: transaction_id
      value: string
      description: The ID of the transaction returned when the product import was created.
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
