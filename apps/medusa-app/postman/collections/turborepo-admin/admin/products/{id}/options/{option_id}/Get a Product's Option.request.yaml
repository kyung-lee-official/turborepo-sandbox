$kind: http-request
description: Retrieve a product's option by its ID.
url: "{{baseUrl}}/admin/products/:id/options/:option_id?fields=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The product's ID.
  - key: option_id
    value: string
    description: The product's option id.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Get a Product's Option.resources/examples
order: 1000
