$kind: http-request
description: Delete a product.
url: "{{baseUrl}}/admin/products/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The product's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Product.resources/examples
order: 6000
