$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/:id/images/:image_id/variants/batch"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The product's ID.
    - key: image_id
      value: string
      description: The product image's ID.
  body:
    type: json
    content: |-
      {
        "add": [
          "string",
          "string"
        ],
        "remove": [
          "string",
          "string"
        ]
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
