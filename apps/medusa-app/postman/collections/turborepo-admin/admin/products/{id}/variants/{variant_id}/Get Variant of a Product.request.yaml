$kind: http-request
description: Retrieve a product's variant by its ID.
url: "{{baseUrl}}/admin/products/:id/variants/:variant_id?fields=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The product's ID.
  - key: variant_id
    value: string
    description: The variant's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Get Variant of a Product.resources/examples
order: 3000
