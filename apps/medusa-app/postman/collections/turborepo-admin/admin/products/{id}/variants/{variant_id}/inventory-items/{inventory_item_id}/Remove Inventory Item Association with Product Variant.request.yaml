$kind: http-request
description: Remove the association between an inventory item and its product variant.
url: "{{baseUrl}}/admin/products/:id/variants/:variant_id/inventory-items/:inve\
  ntory_item_id?fields=string"
method: DELETE
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The product's ID.
  - key: variant_id
    value: string
    description: The products variant's ID.
  - key: inventory_item_id
    value: string
    description: The inventory item's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Remove Inventory Item Association with Product
  Variant.resources/examples
order: 2000
