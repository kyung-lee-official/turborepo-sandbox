$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/:id/options/:option_id?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The product's ID.
    - key: option_id
      value: string
      description: The product's option id.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "product_option": {
          "id": "string",
          "title": "string",
          "product": {},
          "product_id": "string",
          "metadata": {},
          "created_at": "1978-09-23T00:38:19.068Z",
          "updated_at": "2025-02-03T21:25:42.638Z",
          "deleted_at": "2000-11-02T06:37:54.668Z"
        }
      }
order: 1000
