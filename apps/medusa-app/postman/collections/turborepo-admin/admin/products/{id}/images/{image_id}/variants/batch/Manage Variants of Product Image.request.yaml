$kind: http-request
description: Manage the association between product variants and a product
  image. You can add or remove associations between variants and the image.
url: "{{baseUrl}}/admin/products/:id/images/:image_id/variants/batch"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The product's ID.
  - key: image_id
    value: string
    description: The product image's ID.
body:
  type: json
  content: |-
    {
      "add": [
        "string",
        "string"
      ],
      "remove": [
        "string",
        "string"
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Manage Variants of Product Image.resources/examples
order: 1000
