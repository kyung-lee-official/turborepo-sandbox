$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/:id/variants/:variant_id/images/batch"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The product's ID.
    - key: variant_id
      value: string
      description: The product variant's ID.
  body:
    type: json
    content: |-
      {
        "add": [
          "string",
          "string"
        ],
        "remove": [
          "string",
          "string"
        ]
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
