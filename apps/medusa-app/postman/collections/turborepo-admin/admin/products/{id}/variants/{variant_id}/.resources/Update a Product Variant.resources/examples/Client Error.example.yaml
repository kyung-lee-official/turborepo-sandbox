$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/:id/variants/:variant_id?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The product's ID.
    - key: variant_id
      value: string
      description: The product's variant id.
  body:
    type: json
    content: |-
      {
        "title": "string",
        "sku": "string",
        "ean": "string",
        "upc": "string",
        "barcode": "string",
        "hs_code": "string",
        "mid_code": "string",
        "allow_backorder": true,
        "manage_inventory": true,
        "variant_rank": 6660.894375542008,
        "weight": 4672.64265086393,
        "length": 6653.518233945139,
        "height": 7985.146960565288,
        "width": 6605.952455122048,
        "origin_country": "string",
        "material": "string",
        "metadata": {},
        "prices": [
          {
            "currency_code": "string",
            "amount": 2097.0026549801314,
            "min_quantity": 9568.676783715622,
            "max_quantity": 875.502526869707,
            "rules": {
              "region_id": "reg_123"
            }
          },
          {
            "currency_code": "string",
            "amount": 6095.317174086843,
            "min_quantity": 8005.9750251054875,
            "max_quantity": 5296.268001657447,
            "rules": {
              "region_id": "reg_123"
            }
          }
        ],
        "options": {},
        "additional_data": {}
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
