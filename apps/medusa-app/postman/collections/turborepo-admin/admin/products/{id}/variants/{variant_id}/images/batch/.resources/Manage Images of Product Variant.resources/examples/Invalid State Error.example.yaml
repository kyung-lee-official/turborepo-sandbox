$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/:id/variants/:variant_id/images/batch"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The product's ID.
    - key: variant_id
      value: string
      description: The product variant's ID.
  body:
    type: json
    content: |-
      {
        "add": [
          "string",
          "string"
        ],
        "remove": [
          "string",
          "string"
        ]
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "code": "unknown_error",
        "message": "The request conflicted with another request. You may retry the request with the provided Idempotency-Key.",
        "type": "QueryRunnerAlreadyReleasedError"
      }
order: 5000
