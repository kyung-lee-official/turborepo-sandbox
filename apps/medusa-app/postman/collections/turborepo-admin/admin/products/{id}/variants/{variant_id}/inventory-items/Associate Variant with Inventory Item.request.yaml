$kind: http-request
description: Associate with a product variant an inventory item that manages its
  inventory details.
url: "{{baseUrl}}/admin/products/:id/variants/:variant_id/inventory-items?field\
  s=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The product's ID.
  - key: variant_id
    value: string
    description: The variant's ID.
body:
  type: json
  content: |-
    {
      "required_quantity": 5645.698657130119,
      "inventory_item_id": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Associate Variant with Inventory Item.resources/examples
order: 2000
