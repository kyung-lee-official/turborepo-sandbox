$kind: http-request
description: Create a new product import process. The products aren't imported
  until the import is confirmed with the
  `/admin/products/:transaction-id/imports` API route.
url: "{{baseUrl}}/admin/products/imports"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "file_key": "string",
      "originalname": "string",
      "extension": "csv",
      "size": 8729.471669884639,
      "mime_type": "text/csv"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create Product Import.resources/examples
order: 2000
