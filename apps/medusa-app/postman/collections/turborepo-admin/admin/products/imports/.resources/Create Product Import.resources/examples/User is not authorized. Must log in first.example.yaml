$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/imports"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "file_key": "string",
        "originalname": "string",
        "extension": "csv",
        "size": 8729.471669884639,
        "mime_type": "text/csv"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
