$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/imports"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "file_key": "string",
        "originalname": "string",
        "extension": "csv",
        "size": 8729.471669884639,
        "mime_type": "text/csv"
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
