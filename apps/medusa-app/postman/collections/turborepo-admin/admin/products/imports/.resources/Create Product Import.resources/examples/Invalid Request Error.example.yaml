$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/imports"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "file_key": "string",
        "originalname": "string",
        "extension": "csv",
        "size": 8729.471669884639,
        "mime_type": "text/csv"
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "invalid_request_error",
        "message": "Discount with code TEST already exists.",
        "type": "duplicate_error"
      }
order: 6000
