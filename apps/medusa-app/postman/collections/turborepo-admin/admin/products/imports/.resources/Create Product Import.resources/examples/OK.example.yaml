$kind: http-example
request:
  url: "{{baseUrl}}/admin/products/imports"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "file_key": "string",
        "originalname": "string",
        "extension": "csv",
        "size": 8729.471669884639,
        "mime_type": "text/csv"
      }
response:
  statusCode: 202
  statusText: Accepted
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "transaction_id": "string",
        "summary": {
          "toCreate": 6094.828136315688,
          "toUpdate": 7866.986765558028
        }
      }
order: 1000
