$kind: http-request
description: Manage the customer groups of a customer, adding or removing the
  customer from those groups.
url: "{{baseUrl}}/admin/customers/:id/customer-groups?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: |-
      Comma-separated fields that should be included in the returned data.
      if a field is prefixed with `+` it will be added to the default fields, using `-` will remove it from the default fields.
      without prefix it will replace the entire default fields. This API route restricts the fields that can be selected. Learn how to override the retrievable fields in 
      the [Retrieve Custom Links](https://docs.medusajs.com/learn/fundamentals/api-routes/retrieve-custom-links) documentation.
pathVariables:
  - key: id
    value: string
    description: The customer's ID.
body:
  type: json
  content: |-
    {
      "add": [
        "string",
        "string"
      ],
      "remove": [
        "string",
        "string"
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Manage Customer Groups of Customer.resources/examples
order: 1000
