$kind: http-example
request:
  url: "{{baseUrl}}/admin/customers/:id/addresses?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields. This API route restricts the
        fields that can be selected. Learn how to override the retrievable
        fields in the [Retrieve Custom
        Links](https://docs.medusajs.com/learn/fundamentals/api-routes/retrieve-custom-links)
        documentation.
  pathVariables:
    - key: id
      value: string
      description: The customer's ID.
  body:
    type: json
    content: |-
      {
        "address_name": "string",
        "company": "string",
        "first_name": "string",
        "last_name": "string",
        "address_1": "string",
        "address_2": "string",
        "city": "string",
        "country_code": "string",
        "province": "us-ca",
        "postal_code": "string",
        "phone": "string",
        "metadata": {},
        "is_default_shipping": true,
        "is_default_billing": true,
        "additional_data": {}
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
