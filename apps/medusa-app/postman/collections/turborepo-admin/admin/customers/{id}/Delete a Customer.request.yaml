$kind: http-request
description: Delete a customer.
url: "{{baseUrl}}/admin/customers/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The customer's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a Customer.resources/examples
order: 5000
