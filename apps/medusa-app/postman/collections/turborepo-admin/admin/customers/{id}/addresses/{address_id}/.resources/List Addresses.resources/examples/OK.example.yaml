$kind: http-example
request:
  url: "{{baseUrl}}/admin/customers/:id/addresses/:address_id?fields=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields. This API route restricts the
        fields that can be selected. Learn how to override the retrievable
        fields in the [Retrieve Custom
        Links](https://docs.medusajs.com/learn/fundamentals/api-routes/retrieve-custom-links)
        documentation.
  pathVariables:
    - key: id
      value: string
      description: The customer's ID.
    - key: address_id
      value: string
      description: The customer's address id.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "address": {
          "id": "string",
          "address_name": "string",
          "is_default_shipping": true,
          "is_default_billing": true,
          "customer_id": "string",
          "company": "string",
          "first_name": "string",
          "last_name": "string",
          "address_1": "string",
          "address_2": "string",
          "city": "string",
          "country_code": "us",
          "province": "us-ca",
          "postal_code": "string",
          "phone": "string",
          "metadata": {},
          "created_at": "1988-08-03T22:38:35.523Z",
          "updated_at": "2005-12-16T04:29:31.649Z"
        }
      }
order: 1000
