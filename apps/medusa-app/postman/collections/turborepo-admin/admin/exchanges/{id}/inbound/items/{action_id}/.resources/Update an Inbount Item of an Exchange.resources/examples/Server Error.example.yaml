$kind: http-example
request:
  url: "{{baseUrl}}/admin/exchanges/:id/inbound/items/:action_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The exchange's ID.
    - key: action_id
      value: string
      description: The ID of the return item's `RETURN_ITEM` action.
  body:
    type: json
    content: |-
      {
        "quantity": 5220.388807040821,
        "internal_note": "string",
        "reason_id": "string",
        "metadata": {}
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
