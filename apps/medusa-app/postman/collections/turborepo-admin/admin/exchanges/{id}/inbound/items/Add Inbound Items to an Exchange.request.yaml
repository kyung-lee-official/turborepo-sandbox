$kind: http-request
description: Add inbound (or return) items to an exchange. These inbound items
  will have the action `RETURN_ITEM`.
url: "{{baseUrl}}/admin/exchanges/:id/inbound/items?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. If a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. Without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The exchange's ID.
body:
  type: json
  content: |-
    {
      "items": [
        {
          "id": "string",
          "quantity": 3700.1400789903437,
          "description": "string",
          "internal_note": "string",
          "reason_id": "string",
          "metadata": {}
        },
        {
          "id": "string",
          "quantity": 1297.4685037523216,
          "description": "string",
          "internal_note": "string",
          "reason_id": "string",
          "metadata": {}
        }
      ],
      "location_id": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Inbound Items to an Exchange.resources/examples
order: 2000
