$kind: http-request
description: Confirm an exchange request, applying its changes on the associated order.
url: "{{baseUrl}}/admin/exchanges/:id/request?fields=string"
method: POST
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The exchange's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Confirm an Exchange.resources/examples
order: 1000
