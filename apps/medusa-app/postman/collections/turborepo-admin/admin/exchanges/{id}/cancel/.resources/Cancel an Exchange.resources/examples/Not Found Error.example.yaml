$kind: http-example
request:
  url: "{{baseUrl}}/admin/exchanges/:id/cancel"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The exchange's ID.
  body:
    type: json
    content: |-
      {
        "no_notification": false
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
