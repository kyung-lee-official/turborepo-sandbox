$kind: http-request
description: >
  Update an inbound (or return) item from an exchange using the `ID` of the
  item's `RETURN_ITEM` action.


  Every item has an `actions` property, whose value is an array of actions. You
  can check the action's name using its `action` property, and use the value of
  the `id` property.
url: "{{baseUrl}}/admin/exchanges/:id/inbound/items/:action_id"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The exchange's ID.
  - key: action_id
    value: string
    description: The ID of the return item's `RETURN_ITEM` action.
body:
  type: json
  content: |-
    {
      "quantity": 5220.388807040821,
      "internal_note": "string",
      "reason_id": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update an Inbount Item of an Exchange.resources/examples
order: 1000
