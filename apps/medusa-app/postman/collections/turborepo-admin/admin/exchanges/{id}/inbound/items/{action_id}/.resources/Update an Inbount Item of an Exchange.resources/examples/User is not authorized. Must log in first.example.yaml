$kind: http-example
request:
  url: "{{baseUrl}}/admin/exchanges/:id/inbound/items/:action_id"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The exchange's ID.
    - key: action_id
      value: string
      description: The ID of the return item's `RETURN_ITEM` action.
  body:
    type: json
    content: |-
      {
        "quantity": 5220.388807040821,
        "internal_note": "string",
        "reason_id": "string",
        "metadata": {}
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
