$kind: http-request
description: >
  Update the shipping method for delivering outbound items in the exchange using
  the `ID` of the method's `SHIPPING_ADD` action.


  Every shipping method has an `actions` property, whose value is an array of
  actions. You can check the action's name using its `action` property, and use
  the value of the `id` property.
url: "{{baseUrl}}/admin/exchanges/:id/outbound/shipping-method/:action_id?field\
  s=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The exchange's ID.
  - key: action_id
    value: string
    description: The ID of the shipping method's `SHIPPING_ADD` action.
body:
  type: json
  content: |-
    {
      "custom_amount": 9126.97185832982,
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Update Outbound Shipping Method of Exchange.resources/examples
order: 1000
