$kind: http-example
request:
  url: "{{baseUrl}}/admin/exchanges/:id/inbound/items?fields=string"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. If a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. Without prefix
        it will replace the entire default fields.
  pathVariables:
    - key: id
      value: string
      description: The exchange's ID.
  body:
    type: json
    content: |-
      {
        "items": [
          {
            "id": "string",
            "quantity": 3700.1400789903437,
            "description": "string",
            "internal_note": "string",
            "reason_id": "string",
            "metadata": {}
          },
          {
            "id": "string",
            "quantity": 1297.4685037523216,
            "description": "string",
            "internal_note": "string",
            "reason_id": "string",
            "metadata": {}
          }
        ],
        "location_id": "string"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
