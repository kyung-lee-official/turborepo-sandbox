$kind: http-request
description: Add an outbound shipping method to an exchange. The outbound
  shipping method will have a `SHIPPING_ADD` action.
url: "{{baseUrl}}/admin/exchanges/:id/outbound/shipping-method?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The exchange's ID.
body:
  type: json
  content: |-
    {
      "shipping_option_id": "string",
      "custom_amount": 5228.336160679097,
      "description": "string",
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Outbound Shipping Method to Exchange.resources/examples
order: 2000
