$kind: http-request
description: Add outbound (or new) items to an exchange. These outbound items
  will have the action `ITEM_ADD`.
url: "{{baseUrl}}/admin/exchanges/:id/outbound/items?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The exchange's ID.
body:
  type: json
  content: |-
    {
      "items": [
        {
          "variant_id": "string",
          "quantity": 6371.023066959423,
          "unit_price": 580.8458746417089,
          "internal_note": "string",
          "allow_backorder": true,
          "metadata": {}
        },
        {
          "variant_id": "string",
          "quantity": 775.7099769973097,
          "unit_price": 9237.67279254671,
          "internal_note": "string",
          "allow_backorder": false,
          "metadata": {}
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Add Outbound Items to Exchange.resources/examples
order: 2000
