$kind: http-request
description: Create an exchange request. Its changes aren't applied on the order
  until the exchange is confirmed.
url: "{{baseUrl}}/admin/exchanges?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
body:
  type: json
  content: |-
    {
      "order_id": "string",
      "description": "string",
      "internal_note": "string",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create Exchange.resources/examples
order: 3000
