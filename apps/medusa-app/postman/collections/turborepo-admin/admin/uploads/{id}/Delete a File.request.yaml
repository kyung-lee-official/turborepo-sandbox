$kind: http-request
description: Delete a file. Uses the installed file module provider to delete the file.
url: "{{baseUrl}}/admin/uploads/:id"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The file's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Delete a File.resources/examples
order: 2000
