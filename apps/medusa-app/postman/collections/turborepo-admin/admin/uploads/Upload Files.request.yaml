$kind: http-request
description: Upload files to the configured File Module Provider.
url: "{{baseUrl}}/admin/uploads"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "files": [
        {
          "name": "string",
          "content": "string"
        },
        {
          "name": "string",
          "content": "string"
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Upload Files.resources/examples
order: 3000
