$kind: http-example
request:
  url: "{{baseUrl}}/admin/uploads/presigned-urls"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "originalname": "string",
        "size": 7435.200434867555,
        "mime_type": "text/csv",
        "access": "private"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
