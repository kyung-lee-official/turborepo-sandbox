$kind: http-example
request:
  url: "{{baseUrl}}/admin/uploads"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "files": [
          {
            "name": "string",
            "content": "string"
          },
          {
            "name": "string",
            "content": "string"
          }
        ]
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
