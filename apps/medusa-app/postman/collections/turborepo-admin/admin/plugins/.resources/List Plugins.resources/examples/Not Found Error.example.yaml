$kind: http-example
request:
  url: "{{baseUrl}}/admin/plugins"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
