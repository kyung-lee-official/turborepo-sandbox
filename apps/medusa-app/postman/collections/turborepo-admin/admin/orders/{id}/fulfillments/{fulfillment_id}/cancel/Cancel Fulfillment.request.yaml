$kind: http-request
description: Cancel an order's fulfillment. The fulfillment can't be canceled if
  it's shipped.
url: "{{baseUrl}}/admin/orders/:id/fulfillments/:fulfillment_id/cancel"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order's ID.
  - key: fulfillment_id
    value: string
    description: The order's fulfillment id.
body:
  type: json
  content: |-
    {
      "no_notification": false,
      "additional_data": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Cancel Fulfillment.resources/examples
order: 1000
