$kind: http-example
request:
  url: "{{baseUrl}}/admin/orders/:id/changes?fields=string&$eq=string&$ne=string&\
    $in=string,string&$nin=string,string&$not=string&$gt=string&$gte=string&$lt\
    =string&$lte=string&$like=string&$re=string&$ilike=string&$fulltext=string&\
    $overlap=string,string&$contains=string,string&$contained=string,string&$ex\
    ists=true&id=string&status=string&change_type=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: >-
        Comma-separated fields that should be included in the returned data.

        if a field is prefixed with `+` it will be added to the default fields,
        using `-` will remove it from the default fields.

        without prefix it will replace the entire default fields.
    - key: $eq
      value: string
      description: Filter by the order change's creation date.
    - key: $ne
      value: string
      description: Filter by the order change's creation date.
    - key: $in
      value: string,string
      description: Filter by the order change's creation date.
    - key: $nin
      value: string,string
      description: Filter by the order change's creation date.
    - key: $not
      value: string
      description: Filter by the order change's creation date.
    - key: $gt
      value: string
      description: Filter by the order change's creation date.
    - key: $gte
      value: string
      description: Filter by the order change's creation date.
    - key: $lt
      value: string
      description: Filter by the order change's creation date.
    - key: $lte
      value: string
      description: Filter by the order change's creation date.
    - key: $like
      value: string
      description: Filter by the order change's creation date.
    - key: $re
      value: string
      description: Filter by the order change's creation date.
    - key: $ilike
      value: string
      description: Filter by the order change's creation date.
    - key: $fulltext
      value: string
      description: Filter by the order change's creation date.
    - key: $overlap
      value: string,string
      description: Filter by the order change's creation date.
    - key: $contains
      value: string,string
      description: Filter by the order change's creation date.
    - key: $contained
      value: string,string
      description: Filter by the order change's creation date.
    - key: $exists
      value: "true"
      description: Filter by the order change's creation date.
    - key: id
      value: string
    - key: status
      value: string
    - key: change_type
      value: string
  pathVariables:
    - key: id
      value: string
      description: The order's ID.
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "code": "unknown_error",
        "message": "The request conflicted with another request. You may retry the request with the provided Idempotency-Key.",
        "type": "QueryRunnerAlreadyReleasedError"
      }
order: 5000
