$kind: http-request
description: Mark an order's fulfillment as delivered.
url: "{{baseUrl}}/admin/orders/:id/fulfillments/:fulfillment_id/mark-as-deliver\
  ed?fields=string"
method: POST
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      If a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      Without prefix it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The order's ID.
  - key: fulfillment_id
    value: string
    description: The fulfillment's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Mark a Fulfillment as Delivered..resources/examples
order: 1000
