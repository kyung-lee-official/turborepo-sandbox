$kind: http-request
description: Create a credit line for an order.
url: "{{baseUrl}}/admin/orders/:id/credit-lines?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The order's ID.
body:
  type: json
  content: |-
    {
      "amount": 100,
      "reference": "order",
      "reference_id": "order_123",
      "metadata": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create Credit Line for Order.resources/examples
order: 1000
