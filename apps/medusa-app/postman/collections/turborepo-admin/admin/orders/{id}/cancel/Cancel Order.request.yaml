$kind: http-request
description: |
  Cancel an order. The cancelation fails if:
  - The order has captured payments.


  - The order has refund payments.


  - The order has fulfillments that aren't canceled.
url: "{{baseUrl}}/admin/orders/:id/cancel?fields=string"
method: POST
headers:
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The order's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Cancel Order.resources/examples
order: 1000
