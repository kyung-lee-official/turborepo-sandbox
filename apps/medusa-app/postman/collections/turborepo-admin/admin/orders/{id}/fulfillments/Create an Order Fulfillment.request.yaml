$kind: http-request
description: Create a fulfillment for an order. The creation fails if the order is canceled.
url: "{{baseUrl}}/admin/orders/:id/fulfillments?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The order's ID.
body:
  type: json
  content: |-
    {
      "items": [
        {
          "id": "string",
          "quantity": 5884.446986469947
        },
        {
          "id": "string",
          "quantity": 2019.85878336008
        }
      ],
      "location_id": "string",
      "metadata": {},
      "no_notification": true,
      "additional_data": {}
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create an Order Fulfillment.resources/examples
order: 2000
