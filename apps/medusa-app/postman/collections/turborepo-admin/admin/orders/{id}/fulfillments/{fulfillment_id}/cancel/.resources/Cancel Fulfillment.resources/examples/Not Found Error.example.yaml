$kind: http-example
request:
  url: "{{baseUrl}}/admin/orders/:id/fulfillments/:fulfillment_id/cancel"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: string
      description: The order's ID.
    - key: fulfillment_id
      value: string
      description: The order's fulfillment id.
  body:
    type: json
    content: |-
      {
        "no_notification": false,
        "additional_data": {}
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Entity with id 1 was not found",
        "type": "not_found"
      }
order: 4000
