$kind: http-request
description: Request an order to be transfered to another customer. The transfer
  is confirmed by sending a request to the [Accept Order
  Transfer](https://docs.medusajs.com/api/store#orders_postordersidtransferaccept)
  Store API route.
url: "{{baseUrl}}/admin/orders/:id/transfer?fields=string"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
pathVariables:
  - key: id
    value: string
    description: The order's ID.
body:
  type: json
  content: |-
    {
      "customer_id": "string",
      "description": "string",
      "internal_note": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Request Order Transfer.resources/examples
order: 2000
