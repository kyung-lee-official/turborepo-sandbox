$kind: http-example
request:
  url: "{{baseUrl}}/admin/orders/:id/line-items?fields=string&id=string&item_id=s\
    tring&version=8661.135667642375"
  method: GET
  headers:
    - key: Accept
      value: text/plain
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: fields
      value: string
      description: >-
        Comma-separated fields that should be included in the returned data.

        if a field is prefixed with `+` it will be added to the default fields,
        using `-` will remove it from the default fields.

        without prefix it will replace the entire default fields.
    - key: id
      value: string
    - key: item_id
      value: string
    - key: version
      value: "8661.135667642375"
  pathVariables:
    - key: id
      value: string
      description: The order's ID.
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
