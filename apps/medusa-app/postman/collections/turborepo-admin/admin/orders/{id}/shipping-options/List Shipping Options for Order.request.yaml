$kind: http-request
description: Retrieve a list of shipping options that can be used for outbound
  shipping in an order. This is especially useful when adding outbound shipping
  to order exchanges or claims.
url: "{{baseUrl}}/admin/orders/:id/shipping-options"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: string
    description: The order's ID.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/List Shipping Options for Order.resources/examples
order: 1000
