$kind: http-example
request:
  url: "{{baseUrl}}/store/orders/:id/transfer/request?fields=string&locale=en-US"
  method: POST
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: connect.sid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: fields
      value: string
      description: >-
        Comma-separated fields that should be included in the returned data.

        if a field is prefixed with `+` it will be added to the default fields,
        using `-` will remove it from the default fields.

        without prefix it will replace the entire default fields.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: id
      value: string
      description: The order's ID.
  body:
    type: json
    content: |-
      {
        "description": "string"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
