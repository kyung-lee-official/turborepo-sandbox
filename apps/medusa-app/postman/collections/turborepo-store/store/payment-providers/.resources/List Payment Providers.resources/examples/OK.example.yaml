$kind: http-example
request:
  url: "{{baseUrl}}/store/payment-providers?fields=string&offset=5161.58029452813\
    2&limit=7575.827557165484&order=string&region_id=string&with_deleted=true&l\
    ocale=en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: application/json
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: offset
      value: "5161.580294528132"
      description: The number of items to skip when retrieving a list.
    - key: limit
      value: "7575.827557165484"
      description: Limit the number of items returned in the list.
    - key: order
      value: string
      description: The field to sort the data by. By default, the sort order is
        ascending. To change the order to descending, prefix the field name with
        `-`.
    - key: region_id
      value: string
      description: Filter by a region ID to get the payment providers enabled in that
        region.
    - key: with_deleted
      value: "true"
      description: Whether to include deleted records in the result.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "count": 5830.045760367628,
        "limit": 8398.143184355884,
        "offset": 6277.721946973486,
        "payment_providers": [
          {
            "id": "string"
          },
          {
            "id": "string"
          }
        ]
      }
order: 1000
