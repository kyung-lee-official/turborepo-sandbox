$kind: http-request
description: Retrieve logged-in customer's store credit account by its ID. You
  can expand the store credit account's relations or select the fields that
  should be returned.
url: "{{baseUrl}}/store/store-credit-accounts/:id?locale=en-US"
method: GET
headers:
  - key: x-publishable-api-key
    value: string
    description: Publishable API Key created in the Medusa Admin.
  - key: x-medusa-locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
  - key: Accept
    value: application/json
queryParams:
  - key: locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
pathVariables:
  - key: id
    value: string
    description: The store credit account's ID.
auth:
  type: apikey
  credentials:
    key: connect.sid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Get Customer's Store Credit Account.resources/examples
order: 1000
