$kind: http-example
request:
  url: "{{baseUrl}}/store/currencies/:code?fields=string&locale=en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: application/json
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: code
      value: string
      description: The currency's code.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "currency": {
          "code": "usd",
          "symbol": "string",
          "symbol_native": "string",
          "name": "string",
          "decimal_digits": 2853.057564250974,
          "rounding": 9179.229690049637,
          "created_at": "1978-04-19T11:48:58.610Z",
          "updated_at": "2022-03-17T21:39:43.057Z",
          "deleted_at": "1980-05-15T20:34:50.737Z"
        }
      }
order: 1000
