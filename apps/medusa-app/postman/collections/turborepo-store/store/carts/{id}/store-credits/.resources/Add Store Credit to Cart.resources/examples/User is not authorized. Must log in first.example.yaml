$kind: http-example
request:
  url: "{{baseUrl}}/store/carts/:id/store-credits?locale=en-US"
  method: POST
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Content-Type
      value: application/json
    - key: Accept
      value: text/plain
  queryParams:
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: id
      value: string
      description: The cart's ID.
  body:
    type: json
    content: |-
      {
        "amount": 3295.1123749672597
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
