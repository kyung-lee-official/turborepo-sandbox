$kind: http-example
request:
  url: "{{baseUrl}}/store/carts/:id/gift-cards?locale=en-US"
  method: DELETE
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
  queryParams:
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: id
      value: string
      description: The cart's ID.
  body:
    type: json
    content: |-
      {
        "code": "string"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
