$kind: http-request
description: Remove a list of promotions from a cart.
url: "{{baseUrl}}/store/carts/:id/promotions?fields=string&locale=en-US"
method: DELETE
headers:
  - key: x-publishable-api-key
    value: string
    description: Publishable API Key created in the Medusa Admin.
  - key: x-medusa-locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
  - key: locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
pathVariables:
  - key: id
    value: string
    description: The cart's ID.
body:
  type: json
  content: |-
    {
      "promo_codes": [
        "string",
        "string"
      ]
    }
examples: ./.resources/Remove Promotions from Cart.resources/examples
order: 2000
