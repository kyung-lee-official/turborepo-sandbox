$kind: http-request
description: Change the cart's customer to the currently logged-in customer.
  This is useful when you create the cart for a guest customer, then they log in
  with their account.
url: "{{baseUrl}}/store/carts/:id/customer?fields=string&locale=en-US"
method: POST
headers:
  - key: x-publishable-api-key
    value: string
    description: Publishable API Key created in the Medusa Admin.
  - key: x-medusa-locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
queryParams:
  - key: fields
    value: string
    description: >-
      Comma-separated fields that should be included in the returned data.

      if a field is prefixed with `+` it will be added to the default fields,
      using `-` will remove it from the default fields.

      without prefix it will replace the entire default fields.
  - key: locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
pathVariables:
  - key: id
    value: string
    description: The cart's ID.
body:
  type: json
  content: |-
    {
      "additional_data": {}
    }
auth:
  type: apikey
  credentials:
    key: connect.sid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Change Cart's Customer to Logged-in Customer.resources/examples
order: 1000
