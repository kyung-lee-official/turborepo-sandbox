$kind: http-example
request:
  url: "{{baseUrl}}/store/product-categories/:id?fields=string&include_ancestors_\
    tree=true&include_descendants_tree=false&locale=en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: application/json
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: include_ancestors_tree
      value: "true"
      description: Whether to retrieve the category's parent. If you enable this, add
        to the `fields` query parameter `parent_category` to set the parent of a
        category in this field. You can either pass `*parent_category` to
        retreieve the fields of all parent categories, or select specific fields
        to make the response size smaller. For example,
        `fields=parent_category.id,parent_category.name`.
    - key: include_descendants_tree
      value: "false"
      description: Whether to retrieve a list of child categories. If you enable this,
        add to the `fields` query parameter `category_children` to set the
        children of a category in this field. You can either pass
        `*category_children` to retreieve the fields of all child categories, or
        select specific fields to make the response size smaller. For example,
        `fields=category_children.id,category_children.name`.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: id
      value: string
      description: The product category's ID.
