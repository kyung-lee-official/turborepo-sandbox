$kind: http-request
description: Create a payment collection for a cart. This is used during
  checkout, where the payment collection holds the cart's payment sessions.
url: "{{baseUrl}}/store/payment-collections?fields=string&locale=en-US"
method: POST
headers:
  - key: x-publishable-api-key
    value: string
    description: Publishable API Key created in the Medusa Admin.
  - key: x-medusa-locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
  - key: locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
body:
  type: json
  content: |-
    {
      "cart_id": "string"
    }
examples: ./.resources/Create Payment Collection.resources/examples
order: 2000
