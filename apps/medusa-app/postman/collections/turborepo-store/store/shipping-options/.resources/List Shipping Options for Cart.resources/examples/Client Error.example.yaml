$kind: http-example
request:
  url: "{{baseUrl}}/store/shipping-options?fields=string&offset=5161.580294528132\
    &limit=7575.827557165484&order=string&cart_id=string&is_return=true&locale=\
    en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: application/json
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: offset
      value: "5161.580294528132"
      description: The number of items to skip when retrieving a list.
    - key: limit
      value: "7575.827557165484"
      description: Limit the number of items returned in the list.
    - key: order
      value: string
      description: The field to sort the data by. By default, the sort order is
        ascending. To change the order to descending, prefix the field name with
        `-`.
    - key: cart_id
      value: string
      description: The ID of the cart to retrieve its shipping options.
    - key: is_return
      value: "true"
      description: Whether the shipping option can be used for returns.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Discount must be set to dynamic",
        "type": "not_allowed"
      }
order: 2000
