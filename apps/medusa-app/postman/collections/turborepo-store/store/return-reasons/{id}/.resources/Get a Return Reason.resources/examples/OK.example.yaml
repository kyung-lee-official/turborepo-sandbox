$kind: http-example
request:
  url: "{{baseUrl}}/store/return-reasons/:id?fields=string&locale=en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: application/json
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: id
      value: string
      description: The return reason's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "return_reason": {
          "id": "string",
          "value": "string",
          "label": "string",
          "created_at": "1975-02-22T13:15:49.491Z",
          "updated_at": "1949-04-09T22:07:38.120Z",
          "description": "string",
          "metadata": {}
        }
      }
order: 1000
