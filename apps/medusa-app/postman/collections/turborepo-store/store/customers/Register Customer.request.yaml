$kind: http-request
description: Register a customer. Use the `/auth/customer/emailpass/register`
  API route first to retrieve the registration token and pass it in the header
  of the request.
url: "{{baseUrl}}/store/customers?fields=string&locale=en-US"
method: POST
headers:
  - key: x-publishable-api-key
    value: string
    description: Publishable API Key created in the Medusa Admin.
  - key: x-medusa-locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
  - key: locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
body:
  type: json
  content: |-
    {
      "email": "sQeHQ6SU@kj.wgg",
      "company_name": "string",
      "first_name": "string",
      "last_name": "string",
      "phone": "string",
      "metadata": {}
    }
auth:
  type: apikey
  credentials:
    key: connect.sid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Register Customer.resources/examples
order: 2000
