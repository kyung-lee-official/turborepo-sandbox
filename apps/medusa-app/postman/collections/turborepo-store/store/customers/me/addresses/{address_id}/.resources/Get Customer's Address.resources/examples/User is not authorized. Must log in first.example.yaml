$kind: http-example
request:
  url: "{{baseUrl}}/store/customers/me/addresses/:address_id?fields=string&locale\
    =en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: text/plain
    - key: connect.sid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields. This API route restricts the
        fields that can be selected. Learn how to override the retrievable
        fields in the [Retrieve Custom
        Links](https://docs.medusajs.com/learn/fundamentals/api-routes/retrieve-custom-links)
        documentation.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: address_id
      value: string
      description: The address's ID.
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
