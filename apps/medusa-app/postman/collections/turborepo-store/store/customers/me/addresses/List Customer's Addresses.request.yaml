$kind: http-request
description: Retrieve the addresses of the logged-in customer. The addresses can
  be filtered by fields such as `country_code`. The addresses can also be sorted
  or paginated.
url: "{{baseUrl}}/store/customers/me/addresses?city=string&postal_code=string&c\
  ountry_code=string&q=string&company=string&province=string&locale=en-US"
method: GET
headers:
  - key: x-publishable-api-key
    value: string
    description: Publishable API Key created in the Medusa Admin.
  - key: x-medusa-locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
  - key: Accept
    value: application/json
queryParams:
  - key: city
    value: string
    description: Filter by the address's city.
  - key: postal_code
    value: string
    description: Filter by the address's postal code.
  - key: country_code
    value: string
    description: Filter by the address's country code.
  - key: q
    value: string
    description: Search term to filter the address's searchable properties.
  - key: company
    value: string
  - key: province
    value: string
  - key: locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
auth:
  type: apikey
  credentials:
    key: connect.sid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/List Customer's Addresses.resources/examples
order: 2000
