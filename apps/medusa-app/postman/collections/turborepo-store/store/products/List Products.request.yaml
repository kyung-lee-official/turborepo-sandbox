$kind: http-request
description: >
  Retrieve a list of products. The products can be filtered by fields such as
  `id`. The products can also be sorted or paginated.


  You can retrieve the content of the products translated to a specific locale
  either by passing the `locale` query parameter or by setting the
  `x-medusa-locale` header to the desired locale code in BCP 47 format. If you
  don't pass a locale, and your store has a default locale, the default locale
  will be used.


  With localization, the products' content like title and description will be in
  the specified locale if a translation is available,  and fallback to the
  original content otherwise. Learn more in the [Localization](#localization)
  section.
url: "{{baseUrl}}/store/products?fields=string&offset=5161.580294528132&limit=7\
  575.827557165484&order=string&q=string&id=string&title=string&handle=string&i\
  s_giftcard=true&collection_id=string&collection_id=string&tag_id=string&type_\
  id=string&$eq=string&$ne=string&$in=string,string&$nin=string,string&$not=str\
  ing&$gt=string&$gte=string&$lt=string&$lte=string&$like=string&$re=string&$il\
  ike=string&$fulltext=string&$overlap=string,string&$contains=string,string&$c\
  ontained=string,string&$exists=true&$eq=string&$ne=string&$in=string,string&$\
  nin=string,string&$not=string&$gt=string&$gte=string&$lt=string&$lte=string&$\
  like=string&$re=string&$ilike=string&$fulltext=string&$overlap=string,string&\
  $contains=string,string&$contained=string,string&$exists=true&region_id=strin\
  g&province=us-ca&sales_channel_id=string&category_id=string&options=[object
  Object]&country_code=string&cart_id=string&locale=en-US&external_id=string"
method: GET
headers:
  - key: x-publishable-api-key
    value: string
    description: Publishable API Key created in the Medusa Admin.
  - key: x-medusa-locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
  - key: Accept
    value: application/json
queryParams:
  - key: fields
    value: string
    description: Comma-separated fields that should be included in the returned
      data. if a field is prefixed with `+` it will be added to the default
      fields, using `-` will remove it from the default fields. without prefix
      it will replace the entire default fields.
  - key: offset
    value: "5161.580294528132"
    description: The number of items to skip when retrieving a list.
  - key: limit
    value: "7575.827557165484"
    description: Limit the number of items returned in the list.
  - key: order
    value: string
    description: The field to sort the data by. By default, the sort order is
      ascending. To change the order to descending, prefix the field name with
      `-`.
  - key: q
    value: string
    description: Search term to filter the product's searchable properties.
  - key: id
    value: string
  - key: title
    value: string
    description: Filter by product titles.
  - key: handle
