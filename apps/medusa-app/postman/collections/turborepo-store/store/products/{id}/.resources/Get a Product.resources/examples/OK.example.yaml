$kind: http-example
request:
  url: "{{baseUrl}}/store/products/:id?fields=string&region_id=string&country_cod\
    e=string&province=us-ca&cart_id=string&locale=en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: application/json
  queryParams:
    - key: fields
      value: string
      description: Comma-separated fields that should be included in the returned
        data. if a field is prefixed with `+` it will be added to the default
        fields, using `-` will remove it from the default fields. without prefix
        it will replace the entire default fields.
    - key: region_id
      value: string
      description: The ID of the region the product is being viewed from. This is
        required if you're retrieving product variant prices with taxes.
    - key: country_code
      value: string
      description: The country code the product is being viewed from. This is required
        if you're retrieving product variant prices with taxes.
    - key: province
      value: us-ca
      description: The lower-case ISO 3166-2 province code the product is being viewed
        from. This is useful to narrow down the tax context when calculating
        product variant prices with taxes.
    - key: cart_id
      value: string
      description: The ID of the customer's cart. If set, the cart's region and
        shipping address's country code and province are used instead of the
        `region_id`, `country_code`, and `province` properties.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: id
      value: string
      description: The product's ID.
