$kind: http-request
description: Retrieve the list of supported locales. You can use this list to
  allow customers to select their preferred locale in your storefront.
url: "{{baseUrl}}/store/locales?locale=en-US"
method: GET
headers:
  - key: x-publishable-api-key
    value: string
    description: Publishable API Key created in the Medusa Admin.
  - key: x-medusa-locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
  - key: Accept
    value: application/json
queryParams:
  - key: locale
    value: en-US
    description: The locale in BCP 47 format to retrieve localized content.
examples: ./.resources/List Locales.resources/examples
order: 1000
