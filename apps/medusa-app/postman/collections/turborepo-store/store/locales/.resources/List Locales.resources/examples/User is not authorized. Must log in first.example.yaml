$kind: http-example
request:
  url: "{{baseUrl}}/store/locales?locale=en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: text/plain
  queryParams:
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
