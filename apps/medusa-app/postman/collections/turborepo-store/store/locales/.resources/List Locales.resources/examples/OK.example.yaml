$kind: http-example
request:
  url: "{{baseUrl}}/store/locales?locale=en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: application/json
  queryParams:
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "locales": [
          {
            "code": "en-US",
            "name": "English (United States)"
          },
          {
            "code": "en-US",
            "name": "English (United States)"
          }
        ]
      }
order: 1000
