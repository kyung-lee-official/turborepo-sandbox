$kind: http-example
request:
  url: "{{baseUrl}}/store/product-types/:id?fields=string&locale=en-US"
  method: GET
  headers:
    - key: x-publishable-api-key
      value: string
      description: Publishable API Key created in the Medusa Admin.
    - key: x-medusa-locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
    - key: Accept
      value: application/json
  queryParams:
    - key: fields
      value: string
      description: >-
        Comma-separated fields that should be included in the returned data.
         if a field is prefixed with `+` it will be added to the default fields, using `-` will remove it from the default fields.
         without prefix it will replace the entire default fields.
    - key: locale
      value: en-US
      description: The locale in BCP 47 format to retrieve localized content.
  pathVariables:
    - key: id
      value: string
      description: The product type's ID.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "product_type": {
          "id": "string",
          "value": "string",
          "created_at": "2008-04-11T01:23:12.771Z",
          "updated_at": "1985-01-26T12:28:18.273Z",
          "metadata": {},
          "deleted_at": "1968-05-22T22:51:50.378Z"
        }
      }
order: 1000
