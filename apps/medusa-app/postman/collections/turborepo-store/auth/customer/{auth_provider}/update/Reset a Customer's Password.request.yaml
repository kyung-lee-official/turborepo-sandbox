$kind: http-request
description: Reset a customer's password using a reset-password token generated
  with the [Generate Reset Password Token API
  route](https://docs.medusajs.com/api/store#auth_postactor_typeauth_providerresetpassword).
  You pass the token as a bearer token in the request's Authorization header.
url: "{{baseUrl}}/auth/customer/:auth_provider/update"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: auth_provider
    value: emailpass
    description: The provider used for authentication.
body:
  type: json
  content: |-
    {
      "email": "customer@gmail.com",
      "password": "supersecret"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Reset a Customer's Password.resources/examples
order: 1000
