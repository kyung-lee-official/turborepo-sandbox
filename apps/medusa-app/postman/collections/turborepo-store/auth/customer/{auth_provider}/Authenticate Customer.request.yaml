$kind: http-request
name: Authenticate Customer
description: >-
  Authenticate a customer and receive the JWT token (in HttpOnly cookie) to be
  used in the header of subsequent requests.


  When used with a third-party provider, such as Google, the request returns a
  `~~location~~` property. You redirect to the specified URL in your storefront
  to continue authentication with the third-party service.
url: "{{baseUrl}}/auth/sign-in/customer/:auth_provider"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  auth_provider: emailpass
body:
  type: json
  content: "{\r

    \    \"email\": {{customer}},\r

    \    \"password\": {{customerPsw}}\r

    }"
examples: ./.resources/Authenticate Customer.resources/examples
order: 5000
