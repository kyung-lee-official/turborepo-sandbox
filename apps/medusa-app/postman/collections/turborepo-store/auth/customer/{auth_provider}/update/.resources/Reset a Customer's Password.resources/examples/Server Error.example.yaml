$kind: http-example
request:
  url: "{{baseUrl}}/auth/customer/:auth_provider/update"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: auth_provider
      value: emailpass
      description: The provider used for authentication.
  body:
    type: json
    content: |-
      {
        "email": "customer@gmail.com",
        "password": "supersecret"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "api_error",
        "message": "An error occured while hashing password",
        "type": "database_error"
      }
order: 7000
