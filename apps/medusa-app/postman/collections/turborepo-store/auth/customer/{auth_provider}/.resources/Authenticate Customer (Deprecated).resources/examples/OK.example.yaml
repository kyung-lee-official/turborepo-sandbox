$kind: http-example
request:
  url: "{{baseUrl}}/auth/customer/:auth_provider"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: auth_provider
      value: emailpass
      description: The provider used for authentication.
  body:
    type: json
    content: "{}"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "token": "string"
      }
order: 1000
