$kind: http-example
request:
  url: "{{baseUrl}}/auth/customer/:auth_provider/callback"
  method: POST
  headers:
    Accept: text/plain
  pathVariables:
    - key: auth_provider
      value: google
      description: The provider used for authentication.
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
