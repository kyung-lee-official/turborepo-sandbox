$kind: http-example
request:
  url: "{{baseUrl}}/auth/customer/:auth_provider/reset-password"
  method: POST
  headers:
    Content-Type: application/json
    Accept: text/plain
  pathVariables:
    - key: auth_provider
      value: emailpass
      description: The provider used for authentication.
  body:
    type: json
    content: |-
      {
        "identifier": "customer@gmail.com",
        "metadata": {}
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain
  body:
    type: text
    content: Unauthorized
order: 3000
