$kind: http-example
request:
  url: "{{baseUrl}}/auth/customer/:auth_provider/callback"
  method: POST
  headers:
    Accept: application/json
  pathVariables:
    - key: auth_provider
      value: google
      description: The provider used for authentication.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "token": "string"
      }
order: 1000
